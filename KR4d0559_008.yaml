body:
  text: 一山文集卷八元李繼本撰書代與左司郎中王獻道書僕從戎之日以王事有程不得詣門左乞一言而别曷勝愧負朝使至知進拜左司斯道有輝士林增氣非獨僕之私喜也蓋朝廷用一賢者天下莫不歡然相慶苟奸邪欺負之徒之蝟進則四海有輕朝廷心天下事亦潰爛而不可收拾矣今公一登廟堂萬物叢集然至簡而至要者惟用賢為第一事今天下一家群賢滿朝固不取才于異代苐恐用之未盡則沉抑于山林者多姑以僕所知者言之楊鵬南字九萬保定人淬礪古學穎敏天出其才藻富麗其論辨雄偉其謀畫超絶其文章有先秦西漢氣象其人品之曠逹度越一時輩流萬萬也耕田讀書凡二十年不離鄉里自兵起始挈妻子避亂遼東往年賊據永平嘗以片言下之朝廷授以翰林待制命下即日辭歸衡茒短褐疏食水飲若將終身當事紛糾之際貧賤患難日萃其躬而處之泊如故知之者謂髙士嫉之者每以為狂為迂通國事矣公明逹者苟以此士力薦于朝委之以政必有過人之迹與之謀畫必有折衝尊俎之能使于兵間必有談笑却敵之功他日人將指而誦之曰某士為某官所薦顧不足以成公之名聲乎如必拘舊日之轍遂謂布韋士非省部舊人非歷練老成之器若如此論雖振古之豪傑終亦委棄林莽矣此近世文法吏之積習公素以直亮清忠稱于人人詎肯甘效常人之見而取譏于賢人君子之清議耶僕非黨于楊也直以時方多故政當廣搜人豪共圖治效之秋一有曠世之才視之若衆人然僕恐天下士自此散之四方豈非却之以業諸侯乎楊之所長僕固白之其所短者獨不知吏家之條例與其行移耳蓋以聰明特逹之士視此至為細事使其一旦入官于此稍加之意雖老于吏事者有弗能及豈可以纎微之短掩其殊常之器乎楊之為人士君子多知之而家君與景寧左丞雲翰侍郎知之尤詳倘就而問之其才識之異出處之槩從可知也僕素戇直不敢輕譽一人輕毁一士惟公亮之謹奉書不備代與張副樞書檀溪别後日逺日深欲與景元學士一詣宥府塵物嬰纍遂爾不果曷勝悵惘也賤子近到雲中見西諸侯語及使君無不歆羡在鳳儀平章座中又嘗以兄事功極口言之滿堂豪傑雖不識公者亦皆以公為竒傑之士胡都事來寅審閣下啓處靖嘉又知以捍禦之功擢尚書升宥府在公固不以為重輕在賤子豈不喜自慰耶僕迂書生也然而見知于公者惟以契舊之故耳丞相以憐恤之俾賤子挈家西上旦夕與景元到公處一别遂長往也家業蕭然幸公有以周之不可只作一場說話橐駝山雖佳所謂小敵之堅大敵之擒耳公豪傑也惜無用武之地若肯舍此西行滔滔事其來未艾胸中活法不可拘滯也惟公亮之止善鄢公公輔歐公宋先世真聞在公所幸斥賤名申敬十月二十六日代與劉仲德尚書書向在軍前旅况牢落深仗慰藉之情既而又辱引拔及歸復承贐物髙義古道薄俗所無也近有人自山後來云兄以使事如上京矣賤子本欲奉老母西上以天氣寒沍難以動轉只待符至善回即與同往即因避亂山寨密邇敵境兵一到不降則潰不知者以為得策以僕觀之何異几上肉耶况長鎗李田買驢輩兵各不滿二三百人而授以平章知院分鎮于此其力既不足以禦其設施措注有同兒戲兼之避亂之民供給浩繁上下之間勢將崩沮本以靖亂反以啓亂者也明公贊畫軍政何乃容此庸竪之徒以口舌虛文輒取大官厚祿以致名器泛濫使天下謂朝廷無人耶劉則禮學士文事武備色色俱通留滯山中坐老嵗月政自可惜其子宏今往軍前謀西行之計望兄有以周旋之十一月二十四日與慎言博士書中秋前三日老友李延興端肅書奉慎言博士賢友硯右一向阻濶曷任馳念某五月間因旦起跌損左足至今假息枕薦跬步不能履此時宗一往順義不知也辱書存問至于再三未暇奉答又以蹤跡無定值此蹇厄愈益吾友昔相知何忍遽相誅絶耶所喜動定安穩又知歲貢髙徒中選足見吾友于學事用心而英俊之樂從者孜孜有向上工夫信可樂也某已成篤廢人送行序宗一督取嚴甚不久當寫寄以求是正但老朽于文事素拙每于先秦史漢諸名家之作雖嘗鼠竊模擬曷嘗窺見古人用心處况當衰病之餘情思雕耗以之取青妃白不過應酬一時以悅俗耳竟成何等文字耶宋客之寶燕石楚人之賤荆璞吾友以為是耶非歟宗一方圖北軒為提學官與諸生固留以典校事宗一不得去慎言徒重室邇人逺之思也奈何秋髙氣清㑹面未可卜惟若時自珍練以夀斯文不克悉與中齊允齊書四月二十日辱厚李某端肅奉書中齊允齊二位尊先生典謁者來時以塵冗未遑詣門屏乞一言而别迄兹耿耿不能忘回思燕臺如在天上先生以斯文骨肉我果亦念及羈旅草野之人乎日外兒東遣人來從審道履清健足浣渴懷某託芘粗遣無足言者伯言鄧先生詩與文佳處不讓古人先生文章大家如斯人者何可多得矧于風雅寥落之餘乎今之往必與傾蓋而對談之頃知鄙言之不妄也審矣倚樹吟軒記先生何為于我吝審欲于他人乎取之何患不得記但自不肯他求必欲得先生之作耳先生何為于我吝鄧先生行謹奉書不具備與待用博士書七月十九日某肅書待用博士賢友去冬辱書者再不啻覩風采于青雲之間不久王桂說在文安為訓導已定體待用處事每每有逺略我輩何敢望秋暑動定愈安健學校有規繩可喜也小生自五月得跛不能履之疾司造者之于衰朽人亦至是耶宗一學行甚髙慕吾友胸次出塵俗走謁下風故以短札為先容宗一有中書君數輩欲致之士林煩以斯文故力為主張母使滿船空載月明歸相見知何時惟萬萬寶愛不次與金臺長史書二月三日諸生李某端肅奉書金臺長史相公閣下客嵗雄邑陳倅還拜領手書并詩令人喜玩無已春陽鬯逹德履清健而藩垣翊贊之正流耀士林曷勝慰浣牛馬走藉廕粗遣不足記憶恃愛少瀆知縣劉相公以公務如薊徴羽言為先容以拜下風益以翹企之素也劉侯良有司而仕優益學閣下念走也干聒之故必能以一家見待也謹奉書不具備與麟伯先生書十二月二十四日某肅書麟伯先生文侍向過館下多沐慰籍先生于斯道之不薄矣近審德履清適小生伏芘仍昔某生才俊可喜求見左右望刮目待之就借腳力送至新城為荷學中諸髙弟就書致意遽中不及某某以數也謹奉書不既翁尊兄行軒别去忽歲餘思之令人瘦人來薊門過我必問翁何似則曰翁日與樵牧相隨痛飲狂歌自若也僕雖僕僕東華塵土中未嘗不南望舉觴為先生夀茲留瓦橋忽忽數晨夕商販之地無可為語者專發長耳去煩乘之一來相與對床聽雨說山間林下質實語以盡生前有限杯翁忍復疏外我耶時許生璘方侍坐顧而笑曰先生言是也四月七日甲子僕懼有雨傷稼謹奉書不既與衆上舍書立春後一日一山叟肅書衆上舍賢友足下不相見又半月今年别是一年賢友輩已非雄陽年少時吾知必能以向上功夫自期其于荒怠氣習一掃無餘迹何患古人地位不可到一日使學問文章著天下炳然北方之熖熖其視杜拾遺鄉里小兒狐白裘之說果孰為得耶老夫依舊草草過活濁醪粗飯任吾年如此而已諸賢友所少學貨小兒東來煩鳩合并西齊所缺者更為稟知廣文契友從便發至西門姻禮得此相助皆在諸朋友打快作成莫濡滯也鄉友何士留訪聞一老媪通海上方王傑焦振常語此千萬多方訪問以來診療陰隲事也董亮王瑛等曽在學中看屋否相㑹有期帷萬萬自玉以擢巍科不既與友人書前嵗兄南時弟在林下恨不得餞送洎兄以病歸親友皆歡喜弟時治裝待起發又恨不得去山中為數日留以罄平生歡今往矣山川阻濶相見知何時念我故人墮淚滿襟此時想兄雖未勿藥而有道者氣象自與常人殊但宜屏去一切營謀淡然自處人情世事悉置度外而理家治生自有賢嗣為之人生如朝露何乃一向疲心勞慮以自苦耶非敢勸兄作迂濶事顧兄老矣既已遂山林之願只可親近方藥調元氣以登上夀而又欲諸事求全汲汲每若不足世寧有是理耶弟素辱知故敢饒舌罪過罪過前歲弟來自山西時不肯挈家往易水而從東安丞李燧招致親夏楚事未幾逼為訓導至有今日之悔其過本皆此豎為之夫復何言老親在鴈門兩年無書止是口信去歲欲覲省又山西省亦有吳尚書起取之文所以一向留滯于此事已無可奈何俟到南京此身一有歸定處庶母子得以保聚也舍弟兩人俱流落無消息婦人輩知在父母家小兒子財五嵗弟此行行李蕭然必是失所惡况滿懷不能一一道也仲紳說李良兄有相助意而日久不報豈忘之耶乞以此意達之與董淶水書閣下問學宏深才藻富麗律身率物視篆來修舉廢墜炳然一新他時重吾民甘棠之思膺要階不次之擢非閣下而誰然閣下既已加意于政務之百端獨未盡美于學校之一節僕深為閣下惜之夫學校之事重矣為守令者誠宜鼓舞而作新之使庠序之更新士子之奮厲士大夫爭先為之快覩也閣下因循嵗月託之空言未臻實效豈因陋就簡而有所不為歟抑亦政務叢委而有所未遑歟僕皆不得而知也閣下之意必曰今廟學之規則完矣生徒之數則足矣是學校曷嘗不興士大夫亦曷嘗訾議耶殊不知此但可以為學校之規模而未足以見學校之實功也如必欲求其實功焉則宜常切勉礪嚴加程督别其優劣以勸懲之考其勤惰以黜陟之稍減二三之科徭少施纎微之優恤如此則雖冥頑之家亦知教子雖駑鈍之子亦知務學矣閣下之意必曰今生員無除差例而子言之非違制耶然僕之意非欲盡免一切差徭也但欲閣下少垂惠慈以為培育之地而已且未作學户之先閣下猶當優恤既作學户之後可不加之意乎况里甲之弊不可縷數百姓告消乏則謂貧户有優恤之理學户訴重併則曰生員無除免之文故民間為之語曰生貟不如百姓百姓不如祗卒學户之家僅有兩丁其子既為生員其父又當甲首子既常川在學父又常川應役祗卒之家縱有數丁一人既充身役一家並無科擾本身既已在縣本社即加畏懼此無他蓋緣生貟無伸訴之處而祗卒有相該之時也僕若隱忍而不言閣下又安得而知乎况愚民無知不嗜儒術聞其設學如畏敵仇使之讀書如蹈湯火是以各生貟其逃學者往往有之其託故者比比皆是僕每見官府之勸學也不過曰汝肯讀書必為他日之人材殊不知彼固以人材為仕宦之梯而一登仕途惟恐其犯官針遭禍譴也以是勸之愈難而愈逺矣僕叨預庠事嵗已一周其于生徒也不過假官府之法而鈐束之借夏楚之力而整飭之是豈久而不失之道哉閣下聰明絶人識趣超越則此二十名之生貟其各户差役固宜減其分數去其太甚庶使其子弟見若父兄之得所必不以家事繫心而務學矣其父兄見若子弟之務學亦不以差役動念而相勸矣又何勞于官府之法夏楚之力哉將見鼓舞乎文風教雨之中而不自知也僕前所謂興舉學校之功者此也如曰某邑之規模若彼其卑也某郡之學校若彼其陋也而人亦不議其非嗚呼春秋之法責備賢者彼又烏足與閣下比倫也哉且閣下之瓜代僅有七月耳苟于此事有以力為之是閣下于七月之近而遽能使學校之底于成功也豈不偉歟苟不有以力為之是閣下于三年之久而竟不能使學校之及于寸效也豈不惜哉且額設生貟雖曰二十名而事故患病者居常五六七坐齊讀書止是十四五知之者以為各有事故不知者以為本無實數如蒙于額坐生貟外再簽五六以充增廣之數則襟佩有濟濟之儀弦誦有琅琅之聲其規模豈不度越尋常萬萬哉或有行謗者曰李某之欲增廣生貟優恤學户其計蓋將廣求束修也縣宰之不增廣不優恤其意蓋將沮其所為也夫貪求束修咎在于僕興學校責在閣下閣下直當存其大體而不可拘于嫌否則因噎而廢食也人又曰閣下之舉事公矣其如不能剛斷何閣下之律身廉矣其如不納規諫何僕則以謂非閣下不能剛斷也以居官者往往有生事之害故也非閣下不納規諫也以進言者往往有行間之弊故也雖然閣下之意可謂得之此而失之彼者矣今有人焉勸閣下謂妄生事端謂之生事可也至于閣下以興舉學校增廣生員其可謂之生事乎遽又有人焉勸閣下以戕害善良謂之行間可也至于勸閣下以興舉學校增廣生員亦可謂之行間乎語曰季文子三思而後行子聞之曰再斯可矣詩曰如彼築室于道謀是用不潰于成蓋誨人以剛斷之意也書曰好問則裕自用則小附録與繼本廣文先生書王璞端肅書奉繼本廣文先生尊契侍史不奉言論倐又數載每間獨中思憶風采談議一座盡傾久闕披睹企慕為何如耶近髙弟劉翥來蒙寄示新製雄鬯宏放有一瀉千里之氣因此獲稔吾兄學之愈肆養之愈充橫逸縱恣無施不可深足喜賀也區區雖在散淡然于此事日覺荒弛每覽前人邁往之轍惟興望塵之歎而已舊嵗得告還南臘底返北在郯城過嵗訓導申斯道一見如故相留數日每置酒欵洽淋漓引酌慷慨談笑亦一代偉人也自言與吾繼本甚快且言我舊為保斯道乞為致意天涯故人如此有幾想為憮然也新寒諒惟文候清佳瞻晤未期切冀自愛不宣八月二十日聞髙弟欲還館下因作一書達左右然髙弟更不來兹伯欽學正攜舍甥逰深州因令其拜謁座下就伸起居之敬髙弟領鄉薦足見吾兄陶鑄之效深可喜賀氷雪翁死于道路誠堪悲愴吾兄祭文足伸其九原之氣想冥冥中亦藉自慰也僕令舍甥就致雞黍之奠率撰一文叙交誼之槩望為一覽便中冀示教為幸相見未期惟希自愛九月初四日王璞簡奉繼本廣文契侍史說李慎言字說薊邱生李敏慎言嘗從豫學謁豫製其字說豫告之曰言須慎也慎則弗盩于行而為榮為吉不慎則多至謬迷而為辱為凶故言不可以不慎非謂箝其口而不言也矧道原于天而寓于人使皆置之而不言何以詔斯今而垂方來言焉而不慎何以植言行而善厥躬昔者仲尼氏非法不言故道貫乎古今顔子淵非禮勿言故學優乎諸子參之質魯魯則其言也訥至于勤三省契一貫守約不二而卒承道宗言固慎也非訥也孟氏才髙髙則其言也放至于言仁義道性善風動衰世而上配禹功言固慎也非放也去古日逺聖賢不可作楊墨之教興而正言廢儀秦之說倡而雄辨起稽阮之風靡而清談盛其終至于壞人紀擾天下而賊後世蓋所謂一言而喪邦者嗚呼言曷可以不慎哉走素朴愚每以多言得謗已而自誓言之當言者吾何敢默至于搖吻鼓舌以逞夫利口之鋒吾知其無益于身而卒以取敗吾固將閉口矣乎豫聞衛武公慮其有口過賦白圭之什以自警其後南宫縚日誦其言至于數數而不置孔子以為賢而稱道之豫用是稽諸方冊而得其慎言之義其髙非哆言其近非妄辭蓋易狂之砭礪作聖之矩矱生質粹而氣清種學而樹德誠于是而締審之而固執之則言其言也行其行也無絲髮之可訾議斯不亦敏于事而慎于言乎生揖且謝曰敏之不德言也弗慎而行也弗敏兹辱訓辭何異扣萬石之鍾而破群響也雖然敏嘗讀書山林見夫栖真匿景之儔委身空寂一念不起而坐待其冥㑹于不言之表斯亦可以慎言目之耶豫大噓曰彼蓋忘言非儒家者流所謂慎言也慎言者必如洙泗之教而後可且豫曷嘗教賢忘言哉愚溪說水至信也而狀類有萬不侔是豈水之性也繇于土壤之厚薄形勢之激發耳豫嘗觀于海浮于江亂于河淮知中泠之水居天下第一而廬山之泉次之與夫渭之清涇之濁湯泉之不火而熱醴泉之非飴而甘弱水之不勝芥貪泉之蠧人心潢汙行潦之朝滿而夕除豈非繇于土壤之厚薄歟夫江出岷漢出嶓河出崑崙而淮出桐柏其初一髮之細耳由是放而之東也則沿流淪漣淵澄漫渙而一瀉千里逈若建瓴洎乎經龍門抗底柱滙吕梁而注之江涉葭萌排灧澦走瞿塘而入于海也則洶涌震蕩噴薄飛流鼓為震霆峙為喬嶽而滔天沃日渺渀無涯豈非由于形勢之激發歟故方其出也抵澗壑觸沙石而不泪不汙其逝也彌夜晝窮歲年而不涸不止其來也朝而潮夕而汐而不棘不徐是豈非天下之至信而孟氏所謂水之性者也汪仲常以愚溪自號而徴豫為說余惟水之為性也其靈長與天地同體水之為澤也其沾溉與天地同功顧乃愚其名而汚之不已過乎夫仲常湖海之士也器度超越而才識瓌竒當兹河清海晏之時豪俊之士孰不欲乘長風破萬里浪而以聲光暴于天下哉仲常則韜其英閟其光而晦其跡其志非真有羡于顓愚之徒也特託此以自汚而放形江海之上故强名之曰愚溪仲常蓋自以為愚耳夫自以為愚然後非愚彼有自謂非愚愚群愚而使之愚是之謂自愚其愚其真愚之甚者歟當唐之季栁宗元之居海上也亦嘗以是名其釣逰處謂溪之愚不能利大舟溉五稼猶人之愚不能澤當時名後世也嗚呼宗元以曲學附權姦而取貴顯卒至黜于公議而委骨窮荒宗元誠愚矣尚何愚是溪以自解耶仲常盍為我淈其泥揚其波以滌夫士風之汚疏其源導其流以歸于江湖之大則豫也行將與仲常遊伊洛溯洙泗以詣夫髙明光大之域庶其有以祛夫子之愚也哉子或不信有如白水近野說立名者近于朝居貨者近于市栖真匿景者近于山林蓋各從其類而近之非强之近也荆門平君安道自號近野蓋其天趣不羣雅有自得之樂故其為說則然今夫煌煌國都文物富殷氣象宏朗四夷嚮風人皆以為可近而君則曰不可近泱􅐯之野閴其無人豺狼所宫蛇虺所窟人皆以為不可近而君則曰可近果孰是耶矧安道前代衣冠家才藻巨麗光賁士林屬諸宇縣清夷之時固宜挾長策吐竒論籋足雲衢以近天子之寵光顧乃懷瑾握瑜樂夫四野而近之豈帝閽寥泬天顔孔昭九旗焜煌百靈擁護震懾而莫敢近耶豈四嶽奉贄群龍滿朝玉帛雲委車騎霆訇退巽而莫敢近耶是皆不得而知之雖然布褐之夫不近乎紈綺目未接乎紛奢也道德之士不近文華性未淪于浮靡也此非各從其類而近之歟若夫生長富貴之家崛起鄉邦之中不貴其貴而臞然如一寒生不富其富而粹然若有道者此其志蓋超乎習尚出乎等夷而放乎塵坌之表豈直近田野伍樵牧哉然而摯耕有莘之野則摯近乎野矣說築傅巖之野則說嘗近于野矣由是成湯得摯而擢之保衡之階武丁得說而處之爰立之地其始也如陰谷之幽陽光不照而枯荄凝寒其終也如九宇之宏元運必逹而萬彚皆春旦而野夕而朝旦而匹夫夕而卿相其榮悴有自然之天其顯晦有自然之道則夫安道之近于野其自處之重不亦近于兩賢哉是故近于野則樂道而忘人之勢近于朝則行義以適時措之宜若乃近名以害道近利而忘義君子不由也大抵髙明光大之域雖未至于堂奧苟日近而不已斯至矣囂煩淖濁之壤雖未逹乎畔岸苟日近而不已斯逹矣之二者孰為可近孰為不可近盍亦慎其所之哉夫子不云乎信近義恭近禮好學近智力行近仁知恥近勇此聖學之奧㫖萬世之矩度安道才識髙甚一日近乎朝廷之上以行其有用之學擇其可近而近之如是而後可以近道安次李延興撰石林說髙昌金先生兵後退休石林之野清坐一室以圖史自娛簡寂而冲虛無長物以亂心自號石林著其質也後十許年畹雪生李延興過而問之曰先生前代勳伐之裔厯臺閣荷龍光而著名聲至其為號也無圭衮之慕無肥堅之羡無華榱廣厦之嗜而淡然若忘世泊乎若無所營先生殆將隱矣不然當兹朝野方晏熙群材悉展用固當挾長策吐崇論籋武霄衢叫閶闔而呈琅玕矣顧乃息影林下木石與居豈韓愈氏所謂入林惟恐其不密歟雖然宇縣之中何所獨無山林也而奚取于石林哉謂為中流之砥柱歟石也非林也謂為明堂之梁棟歟木也非石也蓋先生以堅剛茂盛之德脫塵滓軼煩囂挺然而不拔介然而不奪斯其所謂石林也歟夫惟石也故足以騰雲氣障百川惟林也故足以干青雲芘萬人陵谷變遷而不為之灑氷雪凝沍而不為之摧神物為之呵護而元氣與之回薄河山助其雄麗而雨露賁其文章此石林之竒槩非先生孰與同其風格也或者謂是為非然盍亦求之漭蒼之野乎閴寥之鄉乎不毛窮髮之壤乎先生有大芘寒士之志有主維名教之力有長育人材之德而今旄矣端居之隟策石杖招石友相羊石林之下其樂寧有涯涘哉豫先公承旨與先生有同朝之好故豫兩世為世契蓋嘗考其世德矣惟其積纍之厚故其承藉之逺衍而裕之以千百世而無窮庸詎無其人乎昔謝康樂美其子弟曰芝蘭玉樹當生階庭知其世有令德也石林之植茂矣後人于此而培育之行見由身而子而孫而雲仍聨芳襲蔭于纍葉者孰非吾道之南宫雲臺也乎淡然說恆山張鍊師號淡然取賈太傅誼惜誓篇中語也其里人楊子幼父為余言師厲志潔修寄情髙逺葆貞養性于世外者有年豫聞其言欣然欲為之說適客有笑于座者曰昔誼以經世之才于卒然遇主之頃謂功業可立就一見斥則憂憤抑鬱不自勝洎乎習于世故之久遂欲屏去紛華而栖身閒寂此淡然自樂之語其誼之所以自解者乎今師以黃冠羽服之士泰初之與鄰而列仙之與遊無功業之慕也無紛華之習也無憂憤抑鬱之思也而乃自比于誼不亦爽乎余解之曰何傷也其在物也金百鍊而始精其在人也志百挫而始厲彼老氏之徒獨不然耶方其求諸乎至道也非可以鋭進而速化也蓋必苦體絶甘制精鍊魄沉寂如死灰拘縮如罝兔熏墊于歊煩汚濁之壤而後超出乎清淨𤣥漠之墟中扃靈眀物不能纍凡其珍玩之華文繡之鮮滋味之腴貨利聲色之盛皆不足以入其目怵其心一視之淡然也故儒家者流亦曰君子之道如菽粟布帛言無欲也無私也無欲無私斯淡然矣宜師之自號有取于誼之自解者也然誼之淡出于憂憤抑鬱之餘師之淡得于葆貞飬性之中審而行之不亦近道矣乎余因是有見于道矣廣成子之告黃帝曰至道之精窅窅冥冥至道之極昏昏默默張良謝病辟榖曰願棄人間事從赤松子逰夫窅冥昏默與棄絶人間事非道之淡然者乎是說也余聞諸學仙之人而未之有得何日從師候安期羡門于海上與之扣至道之奧淡然自樂于天壤間乎客遂唯唯而退余乃托其言以為淡然說而復因楊子以貽鍊師云耕雲說古之人遭叔季之世時不偶道不行託跡耕稼以栖息山澤者多若伊尹耕莘嚴光耕富春諸葛亮耕南陽之數子雖閲世滋久而髙風大節播霄壤照册書猶一日也孫君德恆以名族負通才治劇郡有佳政當兹四海淆亂操濟世之具以利天下也則宜今焉退藏林莽韜英斂華下同田野之氓何耶蓋道不行時不偶則隱居以求其志焉耳故自號曰耕雲志乎古也然余嘗聞于君曰耕者之業或在山或在野或在江湖之區山者勞野者饒江湖之區者大旱而不焦今孫君之耕匪山匪野匪江湖之區而直曰耕雲殆將厭世途之紛糾抗霄漢而振踔躬耕泱漭之野與雲物為朋徒耶君曰吾自謝事以來居易之佳山水間畎畒足安其身聲利不渝其志春陽鬯逹雲氣坱圠田彼南山于雲之下釋耒而休仗策以遊苐見太行諸峯逈與天際居庸龍門蜿蟺秀雄吐靈景而閟清氣而流雲萬頃騰沓下上如踞虎如遊龍如奔馬如長風駕海而崇濤稽天可遨可嬉可嘯可歌可以狀無涯之世變而自樂其樂焉吾之得于耕雲之趣固在此而不在彼也不然何地無山何山無雲何所無數畝田而欲髙騖逺蹈狉狉猶熊豕然耶矧雲之卷舒以時君子之出處似之耕之為業以勤君子之自食其力者似之方其耕而播播而耘耘而穫有秋不自知其力之勞也譬之雲焉滃而簇簇而雨雨而澤萬植不自知其惠之周也然雨之惠在天者也耕之力在人者也在人者吾盡吾力焉耳在天者吾惟安于所遇以順適其天吾曷敢有幾微責報意也豫聞而嘆之曰余也抗塵而走俗慙德于君也多行將屛棄百事入岩壑㺯泉石以問山中耕稼處卜鄰以居息影林泉之下矣君曰子不觀雲乎而勤而靜而跡靡定子徒見吾耕于山不知吾將由山而野由野而湖江之區若雲之去而不可留也余曰士抱道而處若將終身至其遇也起而以身任道皇王當宇方搜遺才致太平一日徴車至止君必如雲之無心而出籋乎霄衢之上否則盩于時矣故時可出則出李延興撰一山文集卷八
