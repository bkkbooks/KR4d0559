body:
  text: 一山文集卷五元李繼本撰記潞州崔府君廟靈應記府君在唐尹長子縣有異政民甚德之其地萬山環列險而多虎嘗有採樵者道觸虎死其母泣訴于府君君遣使投檄城隍祠頃之正晝霧塞陰崖風生虎自林薄出震栗為俯伏狀遂縳以歸君立命磔之自是虎屏迹無遺類非君至誠以動之曷能焯焯如兹君之沒也民遂廟而祀之一有禱祈若響若答故閲歲雖滋久而民心則益虔可以見府君之德被之人人矣庚戌春僕代匱山西行中書省理問官承堂帖如京師常虞不職獲譴道次潞州拜祠下遂潔齋以禱之神鑒厥忱賜之吉卜已而朝廷不以僕才識下授同知太原府事寵澤優渥紱綬焜煌卜兆之叶若符劵然神之相之亦既侈矣蚤夜競惕思答神庥而官事叢委未遑及也乃涓日命工設色肖像用展歲時之祭兼述其蒞官之異政為神之靈感以傳不朽焉嗚呼神之德著矣而感孚之機則有非吾人所能力致者然而有可致之道焉何也吾盡吾誠焉耳誠或未至而求神之我格借曰祀事孔腆神其吐之矣信乎有其誠則有其神嘗聞之先哲云淶水縣學記淶為古燕地周胙召公此其封域王化漸被莫先于兹繇戰國來宇縣割裂民涉鬬爭士廢禮教古風由是泯泯也元之有土校庠勃興中更亂離文教滋熄皇上龍奮之初遂大振儒風以文萬世之太平于是國有國學府有府學而州而縣莫不有學兼之設教有條肄業有科師徒供給有廩膳有司勸沮有升黜甚盛舉也河東董侯紹顔繇儒起家擢國子學録尋以選知縣事縣之學政實領之學故有先聖廟有講堂規模卑陋人以為弗稱侯乃于政務之餘興廢補敝洪武七年春作東齋三明年春作西齋如東齋之制堂後作小室一與堂楹相屬軒户空明几席瑩靚諸生受業之所也又明年夏堂東作庖屋用器悉完諸生會食之舍也西南作射圃中為觀德亭諸生習射之地也廟前作東西廡各三先賢從祀之室也廟旁樹學規石刻示永久也廟外曰神門又其外曰櫺星門以繕以營悉中儀矩繚以崇垣植以名木嚴廟貌也且其地與代郡鴈門相聯屬其勢控居庸闖紫荆而距蜚狐之口師旅往來使傳絡繹符檄積几案酬接無休期侯乃于紛劇之辰而寓整暇之意于注措之際而有先後緩急之規俾數十年瓦礫灌莽之墟于是俎豆而絃歌之匪材且賢曷克臻兹部使者凡再蒞之檄奬有加而薦書上矣延興猥以譾才代匱學職鉛槧之厪而章句之怠夏楚之瀆而教育之疏視侯有不愧乎縣父老以侯政有禆風教也將勒文于石以垂不刋而謁延興記之嗚呼聖人之道昭垂如日星王者之化無私如天地誠使任民社者有以闡聖道敷王化維世教淑人心行見有首有趾咸樂育乎覆冒之中照臨之下一日碩才出美化行是邦也將不為伊洛為洙泗為堯舜之俗以彰儒效于無窮哉侯之此舉增斯道為九鼎矣先是縣簿朱子魯典史劉中以侯鋭意于學克相厥功八年夏朱以秩滿去任冬劉以得解在告細大之務侯獨任之其于學事功倍厥初他如社稷壇風雷雲雨山川壇無祀鬼神壇城隍廟制度宏偉皆焯焯可書兹不詳著易州山北鄉學記洪武乙卯春詔天下立鄉學蓋以崇美化育群材臻至治也易州古稱要郡風氣髙厚民俗朴淳順而迪之易與為理不可遽以沿徼外之也州之北其鄉曰山北有山泉林壑之美蔚然為一州最太守葉侯子粹至而樂之曰此勝境也以此建學實甚其宜由是倡耆宿勸諷士民士民助工乃創明倫堂三楹門垣崇煥几席瑩潔肅如也尋以禮招致何君大用為之師弟子貟凡三十人大用遵教條嚴訓誨而謹禮節士子鱗萃佩服儼若揖讓進退咸中矩墨匪侯鋭意于學曷克臻兹大用徴豫記則為之言曰自唐而宋而金易之士登巍科躋膴仕代不乏人今可某某數也百稔以來文教滋息工傭農賈競以貨利相長雄絃誦之聲閴乎莫聞非古易州矣以侯之興學以大用之典教行見斯道大行炳耀後先是鄉之士固以聖學著天下匪直為鄉人以自畫也學創于是年夏四月之吉落成于五月之望判官黎侯某長史任處中實贊成之栁居後記北平憲僉三衢徐公之未仕也居其鄉之華川里其地豐腴而爽塏實東南山水佳絶處有田廬有琴有書人之過者必式之曰此隱君子之居于庭于垣栁凡十株公手植也絃歌之隟觴詠其間而蕭逺曠逸超然有出塵之趣而是栁也當暑雨舒霽之朝風日清美之候舊以濯濯以滋繁陰滿軒涼思入袂客至晤語乎煙霏杳靄中懷之滯者以宣心之鬱者以舒萬慮之膠固湔除而無玼蓋雖陶元亮之植栁于其門韋虛心之植栁于其庭未足以易公之樂也及公之入仕也始為御史繼為部使者炳焉振風裁于中外人皆榮之而公則曰自吾筮仕以來邇清光躋要地而沐恩寵欲一如疇昔寄傲華川之野以接武乎元亮之徒其又烏可得耶豫解之曰韋虛心之在唐不過以貴富期子孫無焯焯過人之迹而元亮也丁晉之昏而不欲仕遘宋之篡而不欲臣韜英斂華以放迹于詩酒間此其志樂可知已公以俊偉軼群之材抱醇德藴古學發為用世之文章以黼黻熙載之太平其所際者盛矣使不遇治理之朝則亦終于韋布而已耳又何至于元亮之宰彭澤託于恥見督郵而解組以去也矧公早著蹇諤之聲而復弼澄清之寄聖天子付畀之意不其重于人人乎然則華川之栁其榮其悴固宜不在所懷也他日功成名遂角巾還里賦元亮歸來之辭撫吾栁而愛惜之戒子孫重為之培育其尚能遺芘于無窮哉曲河軒記鴈門之東有邑曰繁畤其山秀雄其水清瑩其風氣徑武而朴茂豫往歲驛過其間故老指以示豫曰某峰為某山某水為某溪某田廬為某隱居處時秋髙木脫天宇空濶毫末皆在目中邑之東其水曰曲河河之北梁先生惟敬居之碧嶂清流映帶下上樵浣之聲響振林樾跨水締室為碾為磨迅湍激之機輪自轉勝地也先生讀書之隟與二三同志葛巾野服流憩水上飲酒以樂不知晷景之西其蕭間曠逸之趣雖龎公之鹿門杜陵之韋曲李願之盤谷不是過也然斯境也前乎此而人莫之先後乎此而世莫之奪先生乃能專有之獨樂之則雖一泉石一草木炳炳有輝矣先生白首邱樊隱德弗曜林壑足以適其性琴策足以娛其心而子而孫足以佩服乎庭訓過賔遊客足以延揖讓而資笑談則先生之優遊是軒也其樂寧有涯涘哉嚮當中原淆亂閭巷之士往往以材氣相雄以功業自負踵不及旋皆徙死而莫遺良田美園罄為墟莽矣先生于是深自保閟介然不為勢利奪此其志人固不得而知也豫以歲辛亥至自薊門訪先生于林下一見即傾倒明年豫歸又三年而復至而先生之情愛猶一日豫以是知先生之篤友誼義也顧以奔馳西東靡所底止欲卜鄰而不可得矧茲又復别去回視西河勝地其何能不眷眷于懷耶而今而後或得以謝絶塵鞅擇是名山水而宴休與先生再修客主之禮當效王逸少故事寫蘭亭一觴一詠之樂也觀德亭記射之為藝古矣自軒后為弧矢其後因之遂有五射之制此射之所由起也是故天子諸侯卿大夫士有大射有燕射有賔射有鄉射皆因是以觀人之德非細事也今天下郡縣庠序林立師弟子貟授受之際必習射于學其鄉射之遺意乎淶水縣學故有射圃而湫隘囂塵觀者病焉洪武丙辰春僉北平等處提刑按察司事徐公按部之餘乃重作之且構亭其中而以觀德扁之規制之偉前此未之有也當斯亭之落成絃誦之休暇而士子之揖讓也豫竊嘗拭目其間矣其射也有一中再中者豫以為難能有三發三捷者輒賞其為竒中至于連發而連破的者固恨其不多見也豫不善射而自幼喜射然張弓挾矢而恆病力之不至揖讓周旋而每患儀之弗謹嗚呼射以觀德尚何足以觀之哉今老矣將返故廬與田父野老樵弋山中亦足暢吾志意夫何能與髦俊之士角失得于一時而以得雋為竒哉雖然射六藝之一名聖賢之樹德實于此乎權輿諸生方當英年可不致其謹乎有以謹之則其射也志必正體必直持弓矢必審固而百發百中矣故射者之中鵠猶學者之詣聖域德固不外乎兹也苟無其德借有貫蝨之巧穿楊之俊殪虎兕之能關六鈞徹七札君子不取也不然古善射者如后羿之勇荀瑶之才共叔段之得衆皆不得其死亦獨何哉圃與亭知縣董侯孟宗實經理之不踰旬而蕆事諸生請記是語于亭壁東安縣邵家莊鄉學記鄉學古也四代之制術有序以教其子弟材成則賓興其賢能而官之于是內之輔相外之嶽牧與凡小大臣工胥此焉出則鄉之有學所係蓋亦不細矣記曰良冶之子必學為裘良工之子必學為箕况吾齊民之子其可不以學為士乎學之則德萃于躬道著于時故三綱敘九法彰而陶斯世于熙皥苟以學為末務而師心任意以妄施之是之謂不學無術多見其顛倒舛訛睢盱惶惑而莫之適從譬之群御乎莽蒼之野而疾馳以逐禽一或御非其道禽終不可獲借曰獲之則亦出詭遇耳東安古名邑風氣渾純而民俗質直治得其道則妥順以安非其道亦強忍懾伏而不敢肆非如他邑之民寬則馴急則擾若羊豕之暴悍未易綏柔也邑之北其鄉曰邵家莊邑長王侯即是以建學乃延致李宗昭氏為之師宗昭前代衣冠家而能遵教條嚴訓誨藹然鄒魯文教之風豫草堂去學館不數里舉武嘗于躬耕之隟聞吾伊于風雨之夕以謂吾鄉由兵後久亡絃誦聲孰意其振絶響于大雅寥落之餘乎雖然以吾宗昭之才夫豈久于鄉學者毋謂其為童子師而瑣瑣焉苟歲月以為事故師之于弟子貴乎迪之以善而于童蒙尤貴乎啓之以正蓋所以謹夫始入之途而不為多岐所惑此小學之教也由是而進于大學則稅駕乎髙明光大之域而可以大行于時宗昭有志于古學其亦以其語諸髙弟子文安縣譙門記洪武二十有六年制詔天下郡縣作譙門一制度也先是有司踵近代之弊事無巨細往往因陋就簡玩嵗愒日以幸其解去鮮克殫竭心思興舉廢墜以潤色昭代不刋之典識者病焉文安知縣尚侯登甲戌進士第歲之夏五視政于兹月易六弦晦矣雖其政務填委應接不暇而能綜核名實悉歸條法以其鍊習治體洞逹民情簡慎自持以事其所事耳矧譙門在所當為宜其不敢後也門距縣治不盡一射而歷歲滋久摧剝于風雨震凌之餘乃卜日之吉墮殘墉撤敗屋擇材之良而重修之門上有樓樓之四周繚以闌檻棲鼓角以警晨夜挈壺水以定刻漏嚴巡邏以防冦暴與夫啓閉之謹譏察之密前此未有也自始役迄告成前後兩閲月而城郭田野不知官府之有興作而民之蜂屯蟻附樂于勸助者固自若也嗚呼讀詩之鮮民之生而知民之勞苦觀春秋之新作南門而知興作之不時夫孰知説以使民民忘其勞有由然哉豫以侯善用民而于國家之制度虔恭而張大之故喜書其槩俾邑之人誦而傳之以示永久焉是役也主簿王某贊其事宜牽聯得書侯名肅字惟知濟南人蘭莊記洛師任宗一氏學行醇正薦紳大夫多器重之當勝國時其先大父憲使公與豫先公承旨皆占籍河南而聯仕臺省入國朝豫與宗一纍佐邑校而以文字為職業故豫兩家為里閈為世契為同道出薊門東兩舍許宗一之别業在焉蘭莊則其讀書之室也客至舉觴嘯詠留連終晷暇則焚香清坐而靜以觀物非知道不如是也豫聞莊廣不踰十餘弓蘭也多不踰三數本而風披雨沭吐芳氣而出塵氛迍時之隱處者未易得此也然萬物之在天壤間可以愛玩而適情者不一也觀其助吟眺則有山林泉石之美供宴樂則有歌舞臺榭之勝角豪侈則有象犀珠玉之富至于以智計得者非智計則莫能致以聲利得者非聲利則有時而失物纍使然也若夫韜智計逺聲利遺得喪布衣韋帶不為辱圭組軒冕不為榮磅礴萬物不能纍出乎物而不能物于物也况于蘭乎夫蘭雖佳植而匪金匪玉雖得亦易致而與凡草木殊宜其為人之所好而不為人之所同好為人之所得而不為人之所同得故惟君子為能獨得之而獨好之其視挾智計衒聲利得所願為以自快一時此市道人所愧為而士大夫爭為之弗藉亦獨何哉于是好事者以蘭之可愛玩也掇蘭以娛心目嗅蘭以頤性情援琴以鼓猗蘭之操攬佩以寫紉蘭之歌浴蘭湯而澡雪其天質入蘭室而想見其善人矧蘭之生不離乎衆卉類乎不潔身以亂倫不植乎稿壤類乎逺濁世以自藏不以幽獨而自媚類乎衣錦而尚絅不以無人而不芳類乎弸中而彪外豫以是而知宗一于是焉是取非世好之可同也雖然以蘭為莊猶以藝為圃也詩書以植之道德以樊之禮誼以穮蓘之聖澤以浸溉之吾知蘭非孤植而與九畹同其芳莊非一地而與九逹同其軌矣宗一有見于此其忍舍其種之美而蕪薉不治譬之五稼不穫而幸其稊稗之有秋乎豫嘗以為知道者非過也豫又聞宗一之幼也見背于父承訓于母其長也教授于鄉有榮耀矣矧其讀書學道礲礪未已而日增月益乎朝廷方柄用天下士豫知束帛賁邱園蓋始乎此豈宜嘉遁蘭莊之野顧瞻童子時耕牧處山青雲白低回而不忍去豫將為子歌招隱士矣紫芝亭記芝何為瑞秀擢乎萬植曠世而一見者瑞何由興和氣之充假物以昭其異也夫天地之清淑回幹于十二萬年之會人得之為圭璋瑚璉之英物得之為景星鳳凰之異均瑞也匪直芝也然芝之生也不蔓以繁使叢委于山谷原隰蕭艾等耳雖瑞匪瑞也惟難遇也人始異之故曰曠世而一見也以曠世難遇之物倐爾賁發于膏壤故曰和氣之充也蓋吾人之和與天地之和流通故動乎沖漠逹乎隱幽被乎山川草木匪若凡物之有生有息有榮有悴者也余聞郝思道氏之先子湖州府君德醇而政平鄉閭化之州人德之其氣之和蓋積乎中發乎外而及乎物矣墓在杭之南山葬之四年盜發山中冢無幾而府君之墓獨存是歲之春旁有紫芝生焉色理瑩潤生意鬯舒質粹而氣腴蒸雲繚霧于佳城白日之表甘泉所出商皓所歌也斯殆和氣之充感通乎天地則有神物以相之耶傳曰和氣致祥其弗信矣乎思道作亭塋次仍以紫芝名之紀瑞也郝氏之子若孫歲時上塜顧瞻紫芝煜煜其光展祭之隙相與芟榛剔穢襲芳咀華眷眷而不忍去亦足見子孫之多賢哉雖然杭當山水佳麗處自五代及乎勝國其民完富不識金革帝元辟南堧而撫之至仁旁洽兹踰百稔後雖小值弗靖尋復輯綏民之桑梓無恙松楸逾茂又數稔于兹國家餘澤之所溉亦優渥矣使丁鬬爭搶攘之年則墓也曷保其固芝也曷保其榮而亭也曷保其輪奐之美繼自今往思道其式固以圖自身而子而孫而雲仍修祼獻妥邱墓繩繩引翼于孝理之世則曠世難遇之瑞將益衍于十二萬年之後矣一日傑人碩士之羣出使事業聲光照天下嶄嶄然為人中之瑞吾于郝氏子孫卜之雪舫齋記居山林則有登臨賦詠之趣涉江湖則有飄泊放浪之懷蓋志其志而不汨乎塵壤之迫隘適其適而不淆乎世慮之糾紛此古之曠逸之士出乎物而不物于物也雄邑尹周侯構齋于公宇之偏既成而落之招豫與常所來往者宴集其中一室瑩潔其質猶雪然四顧空明其狀猶舟然是日晝漏下二十刻飲酒以樂而天大雪逈乎若放舟江之浦而山川皓縞天地渾淪不知吾身之在人世間也侯起而屬豫曰齋不可以不名于是以雪舫顔其額又起而屬豫曰齋不可以無記于是識歲月以書其槩是齋也廣不踰尋丈朴不事雕藻壁以楮不堊不丹榻以木不管不簟左有圖右為史蓻蔬有圃溉藥有池豁然而疏邃然而靚雲容天影之洞煥琴韻書聲之流暢神情道氣之融寫其為樂也則雖獵天山奪蓬婆獻賦兔苑而藻思橫出未足以狀其竒槩也然而山林之清寂不若江湖之夷曠浮遊之險逺不若端居之間適而雪舫名齋侯獨何取于是哉蓋侯自宦逰以來跋涉山川而湖海之氣焱舉乎逈隘之中則其器識之閎也氷雪之質蟬蛻乎塵埃之表則其操行之髙也以歲寒之盟而託交于千古則其友誼之篤也以濟川之材而載道于無窮則其文學之富政事之偉也吾知雪舫名齋豈不為後日之嘉話哉雖然雪之降以天舫之運也以人而齋不隳于風摧雨剝之餘則又在天與人交相勝者也非知道之君子烏足語是哉嗚呼太素一雪也太虛一舟也安得策汗漫而遊無窮出乎萬物之外扣至道于鴻濛之初則雪也舫也齋也孰有而孰無奚暇于致詰耶侯徴豫記豫故書是語以志其志而因以自適其適也侯字士瞻松江人一山文集卷五
