人類言偃愛客即陳遵聞望騰中外公忠出等倫威儀嚴可畏襟度濶無垠公署鈔琴譜黌堂禮席珍河頭虎爭渡桑下雉相馴五袴歌方振三農業已勤官清文字簡鄉飲德風淳我已成迂朽行將賦隱淪弟兄皆鬼物田􅒪半荆榛周急煩賢友持家養老親竒才推葛亮曲學陋平津松徑荒煙裡茅堂野水濵讀書逾懶慢撫事幾悲辛碧蘚侵碁局紅蕖沒釣綸髮蓬苦捫蝨衣破嘆懸鶉出處慚先哲間關類逐臣多情依木石無分畫麒麟城市聊從俗山林擬卜鄰業唯歸竹素書莫上楓宸性入禪家學歌隨樵客斤生涯甘寂寞宰物實陶甄髙尚尊嚴子賢良笑郗詵天涯正愁絶回首遇雷陳盧龍二首迢遞盧龍塞蒼茫灤水波青林雲氣重白澗雨聲多四皓終歸隱三良謾有歌秋風關海上回首淚滂沱匹馬空山路孤煙老樹村松隂連草屋澗水繞柴門秋晚蜂成蜜年深鶴有孫行藏吾道在白首信乾坤七言長律擬上太傅丞相燕在蟠空積雪晴煌煌虎旅控幽并太公制敵分竒正方叔行兵屬老成霜壓貂裘寒氣重星涵龍劍夜光明日華冷射魚鱗甲霞彩朝迎鳥羽旌宇內勳庸扶帝業帳前金鼓震天聲三槐曉雨青浮砌萬栁春風緑滿營獵火燒雲煙四合轅門傳令月三更屯田有策年方稔刁斗無聲夜不驚仗繞中堅排隊出弩驅前馬著班行家藏書史傳賢子國有旗常播令名炳烈精忠通紫極涵濡德澤到蒼生兩封穹爵承殊渥百戰河山定太平門下衣冠多俊拔胸中湖海愈泓澄腐儒漂泊身如寄破屋荒寒病轉嬰七帙慈親傷老朽一絲微命轉伶俜田園蕪沒憂生養骨肉分離憶弟兄水滿釣灘間桂楫煙迷鄉樹隔柴荆相君下顧千金價士類同傾萬古情生意從兹在蔀屋謭材何用請長纓和睦公九日韻絳車曉發萬人看春入燕臺雪半乾聖代人材徴梓杞憲庭風彩接鵷鸞蟾宫露冷三花濕象簡霜飛六月寒北闕焜煌承帝綍東林蕭瑟閉詩壇繡衣勸講臨芹沼蔀屋懷賢賦考槃定有竒勳登汗竹豈無宏策上金鑾天邊紫氣涵龍劍江上青山近馬鞍玉笋班聨三殿外瓊林光動五雲端煌煌嘉瑞鍾神秀皛皛滄溟得木難朝著人爭傳姓字慈闈書喜報平安永懷黃閣千金重自保臣心一寸丹走也向來成老朽短簔煙雨夢漁竿五言絶句立春日試筆霞塢光相炫氷池凍半開影隨瑶色起香逐綵旗來壯士走馬過營門金甲吐光焰笑我讀兵書何如去學劍燈花詞彩發虛明間性涵膏火裏彪外而弸中花豈知報喜賣花風送賣花聲花香撲珠酒買盡擔頭春半是青樓婦山中見王笛㺯林間月簔披隴上雲朱門半消歇人笑不如君聞鴈流響迷湘浦餘哀隔隴雲角殘燈外聽鐘定枕邊聞東波洗硯池毫分赤壁雨墨染蜀山雲旗照龍蛇影波涵星斗文贈隱者聽鐘尋野寺隔樹扣雲關鶴臥琴忩靜樵歸碁局間六言絶句菊蹊荒徑雨苔未掃踈籬霜蕊先開緑酒從人放飲白衣為我攜來山行村村寺寺竹好水水山山路遙林鳥催人喚酒野色隨車過橋題逸士圖秋思枕邊疏雨年光葉上驚飈從渠得馬失馬笑我操瓢棄瓢春日即事蝶㺯花心初日鶯啼門口殘春半嶺半岩古寺一觴一詠髙人題畫虹彩明涵疏雨蟬聲暝咽殘陽人境不殊仙境醉鄉真是吾鄉七言絶句初二晚涼登東樓瑟瑟青楓水郭秋買雞擕酒上東樓一瓢欲贈山中客擲上青溪傲許由經夢筆橋風起湘波斷緑津長歌别恨寫悲辛揮毫幾擬題橋過翻愧當時賣賦人越王臺越王臺前江水深越王臺畔草森森五湖明月青天上照見鴟夷萬古心又陸生賦冠六朝文擲地金聲一座聞莫聽吳歌過江去洲前花月夜紛紛客中喜金震見訪翻翻霜葉飛還墜寂寂風扉掩忽開莫向尊前問僧臘海門秋色逐潮來贈彈筝人秋恨斜飛啼恨深示將燕調雜吳音人人竟聽拋紅錦悔殺當時苦學琴題垂虹亭壁金樽緑酒蕩晴空花壓雙鬟舞袖紅莫唱何戡渭城曲銀筝嗚咽怨秋風送白楊長老龍天擁護大江西江上分襟緑草齊一路藤蘿秋色裏山山樹樹白猿啼又鶴隨金錫忽飛還踏遍吳雲越樹間一髮逺峰斜日外認來多是九華山立秋夜聽秋聲漠漠微雲生曉隂滿庭虛籟薄霜林有聲元在無聲裡聽到無聲思轉深春申君歇也慆淫忍復論指胎畫策市君恩區區篡立成何事翻與皇家闢禍門隗臺野老留人不肯住半醉扶笻入山去天風吹上黃金臺放筆縱橫寫長句山行山壓金臺萬萬重尋幽盡日少人逢况聞水北田廬好白首躬耕學臥龍沙岡曉發白波滉蕩搖青天隔江打鼓是官船天涯漸與故人逺客懷寥落秋風前對月同文禎宗兄賦忩裏娟娟納月光床頭顧影轉凄涼束書幾日還山去露坐彈琴秋樹傍送知縣朝廷考績推循吏暮夜辭金謝故人願借冦恂憐父老早歸重看瓦橋春挽蔣濟川夢妻土蝕瑶叉催白鴈霜沉錦瑟斷朱弦靈幃燈暗隂風起忍見孤兒挂紙錢一山文集卷二
