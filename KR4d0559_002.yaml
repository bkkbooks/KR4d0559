body:
  text: 一山文集卷二元李繼本撰詩五言律龎村野曠煙花白林深露草香雷聲送雨過山氣入雲長逺水鷗邊淨薰風馬上涼長亭無限好暫此解行裝秋日山行林路鬱迢遙村行野興饒兩山青入屋一水白平橋掃石收松子耕雲種藥苖仙人王質輩應向此中樵贈杭州包知事與直大府包從事才華早見收孤忠橫北斗清節照南州白雨江帆暮青楓水國秋向來憂世意惟有淚長流旦起曙色動髙城鐘殘櫪馬鳴千門春放暖十日雪開晴勳業非吾事詩書寄此生青衫王粲老猶欲俟河清遊長春宫飛觀連霄漢山門一徑幽青林藏雨暗白水抱城流未脫塵中趣虛傳物外遊回驂西日晚清磬起層樓出獵圖大漠隂風起煌煌獵騎來關弓霜月滿吹角塞雲開射虎慚無術呼鷹謾有臺蕭條空見畫粉墨亂塵埃早過五門霜白掖樓晚寒鴉城上啼微雲閶闔外斜月建章西憂國心常切成功計轉迷十年京闕下貧病尚羈栖天界寺諸山繞天界千古鎮皇維螭護階頭石龍蟠殿角碑慈雲籠寶樹佛日轉瑶六合資𡨕福春風萬物熙養魚池涵空一鏡碧日晚出纎鱗挾雨隔蒼海衝波碎緑蘋沔南誇丙穴周什薦嘉賔白首清江曲誰憐獨釣人鳴皋亭晴臯一片雪縹眇落秋雲縞袂風前舞瑶笙月下聞聽琴多歲月衝錫出塵氛寄與乘軒者芝田好共分與薛十二過夀寧精舍得歌字鳴雨過青嶂飛煙繞碧蘿庭空留鶴迹江靜聽漁歌長夏迎人少髙年禮佛多飄飄飛錫處千里又相過夕次同川鴉噪晚涼天新晴景豁然柳橋通水市荷港入湖田鷺影沙頭月人煙渡口船相過又相别書到是明年贈境上人山館夜瀟瀟天寒酒力消鴈行衝雪斷燈影隔江遙渡口人爭岸船頭客待潮倦途誰慰藉風景不相饒贈邊將猶記登壇日長驅破敵圍兵隨營火出血灑陳雲飛殺氣吹戎帳腥風拂鎧衣肘懸金印大功壓萬人歸舟次松陵客路幾時盡愁懷到處同斷帆衝暮雨短笛咽秋風水碧沙雲白山青柿葉紅莫言詩費日光動錦囊中望海虞山得蹤字青山秋萬疊詩寫晚愁濃瀑斷峰頭路雲藏谷口松藥爐丹氣上經藏碧苔封誰似仙翁靜階前掃鶴蹤水閣夜坐松風遽清響竹露滴涼秋天水靜涵月照見浮生浮魚跳􅏒水影蟲落打琴聲開軒掃明月吹簫送殘更初夏雨坐白雨傳疏點紅亭納快風荷香清浦近竹暗細泉通問道隨關尹橫經愧馬融衰遲竟何補江海任飄蓬和睦公九日韻秋聲橫笛外曉色畫屏中黃菊雙頭小青山四面同船衝官渡雨木落市橋風十日燕臺路途窮興不窮忩燈忩燈搖影細城柝報更遙白髮愁偏重丹心老未銷雲隂籠月薄秋氣挾霜驕歸思如江水滔滔逐逝潮晚出短策扶衰病輕衫受晚風煙花連浦白霜葉墜林紅骨肉兵戈裡乾坤涕淚中飄飄江海上回首愧漁翁抱病力疾秋風裡扶笻步晚晴霜林朱果落江浦白雲明喪亂逢多難飄零愧此生故人分散盡懷抱向誰傾春日郊行宿雨霑花潤春風步屧輕石門雲氣白野寺竹隂清魚鳥親人喜山林照眼明乾坤任疏散杯酒度餘生又岸栁含煙碧山桃噴火紅長松落殅雪薄袂受暄風伐木隨樵子擕錢覔酒翁猶勝狂阮籍白首哭途窮讀賈誼王粲傳白髮悲王粲青春羡賈生萬言詞慷慨一賦氣崢嶸弔屈心猶壯依劉恨未平懷賢坐長夜斜月半忩明和友人韻亂臣傾廟社禍本久脴胎萬里金城壞千原鐵騎來人心今日異天意幾時回痛哭英雄老凄涼臥草萊又恩幸千年遇艱危一旦遭人材淹草莽勳業付兒曹死戰酬明主兼金買佩刀歸來衣甲破蟣虱費爬搔又月黑妖星現雲紅戰火然魯連終蹈海樂毅又辭燕痛哭懷明主匡時倚大賢那堪頻眺望白鴈落霜天又秋氣滿龍漠君王忽逺巡旌旗照天地哀痛著絲綸雨雪迷青野風雲動紫宸汾陽忠烈大一戰熄兵塵宿嘉祕寺寂寂青山寺千峰翠欲熏禪林黃葉落僧飯白猿分松磴吹晴雪柴扉鎖莫雲悟窮清淨理莫遣世人聞山中值雨風雨連天黑關河入望遙青山懷故國白首戀中朝小市河魚上殘城野火燒寄身岩壑裏生意日蕭條待渡待渡渾河晚懷人水國遙魚龍吹雪浪風雨送春潮百鍊丹心在千莖白髮凋茫茫今古意回首愧漁樵雨和仲禮朱夏多淫雨新涼報早秋疾雷翻電過遙海蹴天浮無計回乾造端居愧俗流滔滔天下溺誰軫萬人憂詠懷丙申嵗作白首殊方客奔馳戎馬間時危憂母老嵗晚寄書還凍雪連荒野寒雲出亂山蒼茫西日外痛哭倚柴關又不見嚴親面光隂忽四年文章多散失勳業竟流傳故塜燕城曲荒祠瘴海邊寒忩讀詩處新廢蓼莪篇又辛苦憐吾弟荒山久避兵素書連月斷白髮滿頭生雪翳忩燈影風涵戍鼓聲沉思憂百結寂寞度殘更又妻子何時見凄涼病轉侵虛傳千里信已負百年心短帽飛霜滿空階落葉深白頭吟正苦回首淚沾襟山寺阻雨急雨過山寺鳴蟬送夕陽空階看雲起虛閣受風涼老柏吹香細垂蘿引蔓長林泉空白首把酒惜年光七言律秋日雜興飛樓上倚泬寥天野色荒涼萬井煙落日荷花白舫外西風桂樹畫闌邊明妃夜泣琵琶月宛馬秋肥苜蓿田千古河山幾爭戰一登髙處一澘然寒食嵗嵗京華度禁煙房陵兄弟虎狼前莫傷佳節愁邊過且放深杯花下傳短技自慙前席召多貧猶得故人憐王師早晚清畿甸穩種城南數畝田清明遊城南立馬髙原黃霧消近城墟落亦蕭條人家上塜灑麥飯野老鋤雲種藥苖紅日金臺晴靄靄白鷗春水暮迢迢移尊淨掃莓苔坐多謝青山慰寂寥寄省掾趙晞顔不見先生十日餘臨流每欲寄雙魚馬卿賦好君王識阮藉身間禮法疏落花啼鳥紛紛亂澗户山忩寂寂虛春興定應題滿帙病中何得慰躊躇自述八口凄涼生事微中原羽騎日騑騑天寒嵗晚歸難定水逺山長信轉稀青眼故人頻送米白頭慈母尚縫衣蕭蕭漢渚蒹葭老好向兒時舊釣磯送别北風吹袂晚臨岐日短天寒獨去時逺海漲空雲泱漭亂山連塞雪參差惶惶兵火家千里寂寂生涯酒一巵傳語親朋好調護路難莫怪寄書遲山居小齋清坐校韋編水碧山青照几筵窈窕虛忩雲入屋蒼茫平野草浮煙階前村嫗舂黃米門外溪童賣白鮮欲賦紫芝招隱士鶴書先寄隴雲邊雪地白雲黃雪亂飛虛簷風急撲征衣子猷入夜乘舟去蘇武殘年持節歸兵後殊方為客苦病來親友到門稀何緣得似兒童嵗貂帽狐裘學打圍又開門飛雪疊階除宛宛溪山畫不如野火逺明喧獵騎茶煙半濕認僧居雲深空谷難尋路風急虛忩亂打書坐待春陽回宇宙無邊生意滿茅廬河上宛宛寒山入暮煙河流直到寺門前店頭買酒風吹幔浦口義魚雪滿船翻覆世情堪大笑寬間野屋得清眠虛堂月色明如晝獨坐清彈五十絃和梅知府寄來詩韻坐想親朋摧肺肝寄來尺素百回看虛忩琴册塵埃亂匹馬關山雨雪寒避地十年頭欲白去家千里淚難乾酒壺爛熳堪謀醉強撥羈愁一盡歡又束裝曉發雪滿路雲起荒山萬里隂菽水久違慈母養綈袍還見故人心哭憐阮籍窮途晚賦寫江淹别恨深春滿故園芳草緑東風門外聽車音又離筵酒盡暮煙微兒子牽衣泣草扉萬里風塵諸弟散十年江海故人稀少陵苦恨無家别季子羞誇衣錦歸謾憶山忩嘯吟處緗簾花影疊朝暉灤河兩澗松聲琴築哀水邊亭子酒壺開千年海鶴遼東去萬里灤江天際來沙路連城白似雪山光過雨碧於苔夷齊餓死修名在凛凛清風被草萊嵗晏紀懷黃雲壓地雪浮浮虛館開觴散客愁白髮驚心催短景蒼江入夢問扁舟時危每羡檀公策志大空懷杞國憂翻憶少年疏放處春風歌舞醉紅樓舟次龍江孤航小駐水西頭泛泛輕鷗對客浮海氣漲雲天塹晚江風吹雨石城秋已將萬事歸詩帙苦乏千金醉酒樓欲向金川門裡住那堪回首戀滄洲贈時中白首相逢寥落中失聲一哭暮途窮霏霏江草愁邊緑寂寂宫花夢裏紅海徼歸心懸夜月柴扉病骨臥秋風人情任逐東流水爛熳金樽莫放空春日紀懷平湖水碧動晴天獨樹花明簇暖煙小白肥鮮堪饌玉嫩黃新韭不論錢田園蕪沒從兒懶杯酒淋漓任客顛四海奔馳壓塵俗百年蕭散愛林泉和梅尹寄來韻栗烈晨風坐轉嚴日髙晴鵲忽喧簷階前雪洗苔痕出門外春催柳色添姓字已歸迂叟傳豐穰屢問大人占村翁野老時相過羡殺香醪如密甜又明晨鞍馬去難尋親友留連惜寸隂北極星辰連逺塞南溟風雪動愁心形容憔悴悲年暮燈火青熒入夜深回首髙歌出門去天涯寥落少知音暮春喜故人至衰年懷抱向君開春晚留連把酒杯忩草霏霏含緑雨林花片片落蒼苔田園成趣聊堪適故舊相逢能幾回揮翰題橋空有志白頭司馬愧無才又乾坤漸老百年身掃地焚香靜裡春巢燕向人爭學語山杯留客細傾銀迂疏無用真堪笑離亂相尋轉見親未卜此生歸定處青冥何敢更求伸雨中偶賦黯淡青林白雨飛隔花莫恨濕春衣恩霑草木生兼遂聲到松篁聽轉微谷口泉清舒藥甲巖隈風亂打柴扉故園有屋多應漏幾日攤書曬夕暉燕相府右傅王公為北平憲副劉公畫馬徴余為詩驍騰逈踏瘴煙底萬騎紛披不敢嘶天繞閬風追日轂雨收沙苑散霜蹄金鞍光動青雲表玉輦飈馳碧海西白首何堪攀逸駕幾回執策聽朝雞寄思溫尹雞泉邑裡識君初回首春風似夢餘惠愛新聞行旅説才名不愧史臣書花明白日青山靜稼簇黃雲早吏疏後夜林扉倍相憶髙情莫忘寄雙魚又展卷虛忩風滿襟生來轉覺秋蕭森鶴翎新沭紫蘿雨雲氣逈隔青松隂太邱雅稱湖海士徐庶忽起庭闈心客懷寥落誰與語解榻遲君來聽琴又山齋留客晚涼初茗枕吹香清夢餘雨過雲生松下石月明風亂枕邊書一家骨肉今無幾四海親朋轉見疏張翰秋來定歸去江湖隨處是蓴魚又長松過雨碧蕭森涼籟吹香滿素襟泉落空潭秋灑灑雲生虛室晝隂隂塵埃書劔千山路風雨江湖萬里心客散衡門更清絶明朝誰聽紫瓊琴又至道不返太古初玄聖一去千載餘養生近得南華論報國耻上東封書四海無家轉悽惻百年處世何迂疏從兹萬事可撥遣短簔獨釣長江魚又虛庭無人坐開襟雲氣滿地何蕭森老夫懷友傳尺素稚子讀書惜分隂小忩涼月破煙夕逺道秋風傷客心羡殺遒城令尹好安得細聽堂上琴定興道中雨外好山青近人峰回谷轉兩溪分聨嵐翠靄浮秋樹隔塞清笳落莫雲農事喜聽田父説漁歌時近水村聞只宜濁酒林亭下解帶風前醉夕曛别山中友峰回徑轉雪嶔崟隱者柴門費獨尋谷口斷雲遮草屋樓頭斜照隔楓林黃金買貴交遊絶白首窮經嵗月深明發分襟兩相憶那堪寥落動愁心喜王延齡至自金陵雪屋燈寒夢見君詰朝車馬競紛紜江湖險阻多親歷骨肉平安得細聞點筆詩篇翻白雪驚人風彩照青雲我衰不入鵷鸞侣還好常隨鹿豕群詠雪效時體沉沉仙館靜無風光動霄衢縹眇中玄圃暖湔瑶草白緑忩春絢錦機紅皇天有道開豐稔詩趣無邊入混融為問兔園張宴處滿堂豪客賦誰工又長風捲海白漫漫三島樓臺畫裡看瑶席香銷金鴨冷銀河水湧玉龍寒春回萱草芽初出臘盡梅華信轉慳清曉天門占瑞象日車飛上五雲端又隔屋狂飈怒擊撞一庭皓彩翳寒釭星妃夜翦銀河水雲氣朝橫玉女忩梁苑賦成誰第一灞橋人去更無雙到門疑是洛陽令有客尋詩驚吠厖又留客同傾北海樽疾風吹霰落紛紛虛軒夜氣浮書潤逈野春聲隔樹聞密灑南樓清護月橫堆西嶺白連雲呼童間掃長松徑幾片飛來亂鶴群又瓊葩春繞畫樓飛盡捲珠簾認翠微影落玉堂翻硯沼光搖金殿晃朝衣長煙壓樹難尋路逺火燒雲正打圍明日出門好晴景氷花滿帽散珠璣又雲飛大野曉糢糊水國微茫一鴈呼風起四簷翻玉樹天移萬象入氷壺子卿持節終歸漢裴相乘虛急破吳五稼從兹兆豐稔老農爭説往年無又曉寒著人肌粟生空