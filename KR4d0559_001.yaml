body:
  text: 一山文集卷一元李繼本撰賦喜雨賦辛亥夏余寓繁峙彌月不雨五月二十有二日大雨作喜雨賦五臺之北五原之陽太行削雲間之老翠滹水落天上之銀潢澮畆縱横池館清涼雞犬静其無諽花竹秀兮有香卧雲子㳺而樂之遂解裝林下而卜隣扵暖泉之傍鄉大夫喜其來而懼其􅉨也相與劌荒榛締草堂開蔬圃拭藥囊有琴在御有書滿床奚奴舂栁隂之白粲隣父過墻頭之緑觴歩明月而歌窈窕臨逝波而咏滄浪跡絶扵城市心息乎紛攘蓋將奉親以自樂而髙卧乎白雲之鄉孰期渉兹盛夏天閟膏雨憂心殷殷莫知所處赤日如焚旱氣旁午牛喘欲頽龍卧不起粟田半焦麥實成粃穹林偃兮槁木破金啼兮渴鼠地靈縮萬井之源海若収百川之水罷千門之筦絃嘆五方之商旅乃有戴白之翁垂髻之子㪺寒潭之清泠羅金檠之香幣走龍祠以祈靈薦牲俎以陳禮旌幢絢兮九霄笙皷訇兮百里娯以優伶雜以士女既醉既飽載笑載喜眇天澤之少施冀神心之蹔啟俄而𤣥霾塞虖泬寥宻霧沉虖階戺恍疑起潜蛟扵岩幽而捲怒瀧扵江渚也少焉明霞収流電止日迎霧以霽澄風吹雲而披靡氣將交而復離惠將布而復弛兆姓吞聲而無驩萬口箋天而矢死巍巍皇穹憫民之窮沛然下雨當兹五月之將終方是雨之欲䧏也炎光墮地層隂蔽空萬螘封穴百鳥號風日車騰騰以遄邁電幟閃閃以交攻山川晻藹乾坤晦蒙雷震天門之皷水涌馮夷之宫及是雨之既作也噴灑空際飛流海東浪奔平皋之雲河走長橋之虹瀉天瓢扵八極散銀竹扵千峯迴生意扵萬象蘇渴望扵三農既而隂氣解駁晴景冲融雲浮浮其若練山宛宛其猶龍鳥嬰嬰其相樂木蓊蓊其成叢平疇漲萬頃之綠竒葩吐千林之紅客有登空山以遐睇鏘環佩扵雲中藉緜緜之茂草䕃落落之長松暝藹逐遥空之孤鶩天風度荒寺之逺鐘俯仰宇宙披豁心胷但見火輪千丈西渡銀海涌出萬朶金芙蓉爾其霞飛林表烟歛天末栁暗歸鴉簷喧乾鵲送西山之夕陽掛南樓之朱箔槐色浮而廷宇清花隂轉而簾櫳薄緗帙曬兮芸軒酒斾揭兮山郭烏犍耕白水之涯紅袖舞清風之閣凉入兮練衣香潤兮錦橐扵是華者實槁者活疾者瘳憂者樂三農得是雨而澄明兩儀得是雨而開廓太和得是雨而流行沴氣得是雨而銷鑠彼棠谿之金美則美矣而惠不若是雨之溥垂棘之璧貴則貴矣而恩不若是雨之渥飛潛動植皆為之鬯舒耆耄幼稚皆為之欣躍信天下之至寳非一物獨得而霑誠宇内之竒珍非一人獨得以囊括天降斯雨豈人所作人被斯澤非天曷託彼有備百禮以禱扵鬼神者孰若精一心以求扵㝠漠也卧雲子復怡然語諸鄉大夫曰始而不雨吾意天實殄厥下民矣既而大旱吾意天實隕厥兆民矣一雨如沭九土皆春天錫吾氓惠也孔殷吾將結青山以為侣招白雲以為隣畊田讀書以終老於滹水之濵迺歌曰雷雨滿盈兮蕩乎無垠氣化廻薄兮出乎無門使天雨玉兮曷若野橋流水清無塵使天雨珠兮曷若石田茒屋屯秋雲吾何以酬天地之大徳兮惟有丹心一寸横蒼旻詩五言古詩王氏别墅旭日照逺水摇映青松林丹霞散餘彩翠烟鬱沉沉好鳥弄晴晝嘉禾敷繁隂天虚風物幽髙爽澄清襟解琴一奏之細和山水音歗歌以相羊頫仰獲我心栖遲嵗年晚將歸故山岑送李順文維齊古青州其地山水秀嘗遭國大祲夾輔猶腋肘宅土稱上腴財賦等淛右竒閫久乃隳完城失封守妖盗起潢池跳梁裒林棷白晝燒通衢戎馬相踐蹂屋化飛塵灰莽莽草木茂往年大姓家存者無八九兵興歳無虚穡事廢南畝紛馳赤白囊烈勛徑何有上貽國之憂軫念夜逹晝簡師行天誅岌岌不敢後秦中出精甲長道屈群醜言言七十城易若摧瓦缶大野熄烽烟多士釋介胄兩河關梁通中原絶紛糾行者如螘旋居者如輻凑濟南李徴君累年文獻舊躬耕食其力園田如錯繡自經喪亂來避地東西走草食面削𤓰布絮體盈垢先師有遺文一一付君手萬死逃一生収藏免脱漏吾嘗觀其書篇章燦瓊玖讀之京華館霜月動虚牖尋將刻棗梓上儷鍾鼎夀古稱賢弟子君乎實無負始予未相識聞譽則已久昨枉過山齋衡扉竹外候吐飯欣接之笑語忘辰酉論議悉超絶白日雲霧剖讀書不窺園焚膏在研究巢由尚羊裘禄仕不掛口譬之天馬駒不肯戀棧豆裹粮出都門歸期迫夏首春容耀桃李川色潤栲杻太行入青雲千峰淡如帚黄河浪卷天風雨怒蛟吼路經百戰場青苔白骨朽抵家拜邱墳狐狸上荒阜俯仰成古今野哭雜山溜莫傷門祚衰晚節當大就立言紹前修蚤夜獵文囿為國植英才民俗盡歸厚我家漢水上昔别齒尚幼囏危十餘年骨肉知在否君歸我何如涕泗滿衣袖執手河之干臨風一觴酒人生㑹合難豈不懷親友相期保令名良時不可久江皋圖江晚月未上白烟滿芳洲雨止山氣佳衡扉在岩幽浦迥沙漫漫松深露浮浮水田早稻熟稍欣獲有秋曠爽來清風朱夏炎敲収野人樂江居垂輪水西頭得魚送隣家酒好仍見留童丱喜相隨浩歌送蜚鷗古時放逹人傲睨輕王侯焉能繋塵鞅憧憧爲身謀我家漢水上田園雅綢繆榖苖含惠澤井洫交新流収穫賙族黨矢心良不媮一自來京都星霜儵十周寄食仰俸粟曷免生事憂藥物縻病身曠望増夷猶翩彼南飛鴻肯寄音信否阻雨題柏山驛壁黯淡連朝雨山牕逓㣲凉絺衣含秋潤散髪此相羊白鳥啼青林澗水亦浪浪隱人不可見思之雲路長歗歌忽終晷西日下平岡富庶驛羸馬下危坡返照在西林長風度清壑澗水鏘玉琴好鳥鳴幽谷晴雲超髙岑解裘背村塢小憇青松隂嗟我忝代祀凛凛懼不任巍巍廣寜祠夐隔遼水潯龍光逺被之紫氣鬱沉沉天香動草木翔舞有胎禽黍稷不疵厲雨露喣以深靈怪亦率職田野絶呻吟顧予蟣虱臣至喜動㣲忱兹願倘可遂庶慰吾皇心山中書事圖史列坐隅深居愜幽情漢上青山多開軒眼増明白鳥烟際來清風竹間生抱甕汲新井佳蔬有餘馨嬾散時自適収書松下行青苔没屨跡凉露尚沾纓入雲問山寺忽聞踈磬聲松下鼔琴圖兩岸何蒼蒼長松在髙岑月出屋東頭㣲雲生夕隂道人眉宇静松間調素琴商聲泛林莽流水為知音我欲往聽之青山白雲深七言古詩仲冬月斗標建子仲冬月曉天雲掩殘月魄滿城霜氣利如刀敝褐蒙頭出不得旭日無光風伯怒冰合水泉厚地裂憑髙曠望目力超瀚海天山千丈雪波濤永閟蛟龍宫原野深藏狐兎穴南山榛栗盡枯死出獵何人馳駟驖俄頃風収氛翳開萬里雲天清帖帖青旗颭颭酒家樓杖頭恰有錢三百何物小兒為侣儔座上能詩有仙客月斜醉倒花樹下銅龍漏下五十刻壁間雜畫山中之人氣奕奕愛畫雲山與水石逺山近山恣一揮頃刻生絹數十尺今代只數髙尚書妙處不減米家筆後之善畫者為誰青山白雲久蕭瑟忽驚座上烟藹生漠漠平林翠如織㔻生夢想不可到乃在君家雪色壁花發窮林破曉紅水合長天蕩晴碧蘆邊鴈影落迴汀沙上漁簔曬斜日白髪蒼頭四老人棋罷松間坐争席筍皮笠子大如傘歸去不愁山雨濕爐經九轉鍊丹成杖掛百錢酤酒喫眼看此景不可親况復憧憧事塵役會須結屋山之阿更求好田水之曲野人生理日有餘畊歸牛角懸書帙茆簷夜火促寒機古甸秋風収晚栗安車若便下邱樊為報先生不可出福源精舍京城六月日如火風軒散髪執書坐頓嫌城市多煩囂欲買田廬何處可素几茶甌吹碧香有客敲扉偶相過爲言越中好山水厥土膏腴不偏頗魏氏之子文貞孫玉樹臨風色瑳瑳讀書淛水之東頭蒐今摭古以自課夏蓋湖光白湧雲福祈山氣青浮座三江帆上暮天長八月潮平秋水大亭邊獮猿長如人月黒林昏盗山果桃源人家疑此是洞口雲深晝無鎻百壺滿醉江南春撃缶髙歌兒子和西蜀少陵恒苦吟南陽武侯尚髙卧文貞昔在貞觀中大節堂堂不終挫好將舊學佐朝堂行見英流振頑懦索居何日賦歸來盡理遺書載經舸我昔耕牧峴山陽門前水田足粇糯十年道阻不可歸江上秋風茅屋破舊栽松柏定成林石墻竹梢添幾箇向來耆舊安穩無每一思之淚交墮福源林壑倘見分卜隣擬住山之左客歸好語仲逺君歳晚寄書煩報我墨竹近時海内稱畫竹息齋筆意何突兀蒼然冩此風露枝墨花落紙秋萬斛恠處不減文湖洲展玩晴窓醒心目竹邊巒石更坡陀便似着身㳺嶰谷青谿過雨山霧寒白月出林烟水緑葛陂老龍頭角秃夜嘘雲氣黒如沐白晝慘慄炎􅒱収展書宜趂清隂讀我有竹林漢水西兒時學種如種玉春翠森森抽細筍風碧娟娟散幽馥有客清似王子猷拄杖􅒱門往來熟欲歸料理不可得夢遶江村白沙曲安得大絹長丈餘請君為我作横幅寫我只作六逸儔掛在秋風江上之小樓題畫山翠浮空初過雨山麓晴雲散芳渚霧合長林生曉寒人家更在林深處澗泉六月飜松根石洞千年隱仙侶有誰共奕橘中來無人問路桃源去白烟遮盡青林花野簌嫩香應可茹清幽不減山之隂只欠蘭亭列觴俎誰乎冩此恠而竒莽莽雲山入毫楮細看猶有遺恨處胡不着我山之墅我生本是邱壑姿誤落京塵幾寒暑小時畊牧峴山陽閒從野人學種樹門前漁浦啼竹禽屋上鶴巢走松鼠獨行採藥日莫歸纔得芝术一斗許縱令服食不得仙何若長年蓻禾黍小村秋晚雞正肥大甕春浮酒新煮老翁醉舞兒子歌笑語諠華忘賔主此樂不見十許年兵火煌煌照南楚思歸見畫萬感生悵望風颿横浦溆時清即好謝官歸全家移向山中住黄崖寺黄崖秀絶不可畫山際飛雲如走馬東來無此好雲林况逢野衲同清話茶烟侵午客題詩松籟吹涼僧結夏人間塵土誠汚人何時息影禪林下寄江都縣丞求船如江東候船十日留𤓰渚寂寂衡扉隔霜樹江頭白浪大如山空外青山橫一縷出門顧影與誰儔市上泥深過尺許愁來買酒醉秋風睡起開軒看山雨棄家辛苦如金陵夢繞山中讀書處今兹胡爲乎久留行止關天非不武江都二縣才且賢念我漂零留我住髙情好逐萬里風穩送孤帆過江去漁陽客邸城外雲山濃佀綺屋裡琴書静如水石爐添火試松香裊裊篆雲飛不起天涯倦客此停驂茶社烟銷猶隱几奚奴呼覺日平西一片秋聲響牎紙柳居圖先生夙華川山中好隱居門前十栁青扶疎種來不記幾歳月生意藹藹充吾廬先生一生好心事放跡其下樂有餘垂垂露葉覆軒户燦燦雪絮吹琴書清風瀟瑟來枕席流水汨鳴階除或逢樵或對漁隔浦蕩輕航呼童巾小車丸藥聴黃鳥攀條穿白魚野老爭席樹隂底凉影團團摇酒壺山中之人有天趣丹墨㸃染成畫圖若非下惠當時宴休處定是柴桑處士之故墟自持御史節朝夕賦歸與載歌栁居栁臨觴惜居諸既不能歸田重培育又不能馳書問何如風瑟瑟動干旟露湑湑沾佩裾千絲萬縷亂心曲渺渺遥思飛雲衢寄言子孫愛惜之要使清隂大芘吾里閭雪溪漁隱圖窮隂塞𤣥冬萬里起墨色爰有子陵之徒住在溪上頭渺渺孤舟釣風雪𤣥冥尸化樞天地爲氷壺霧散烟銷野馬死溪山佳處好隱居繁霙舞空雲黯淡長風捲海天糢糊壯哉滕六大有意爲我漁家掃出萬幅真障圖真障圖世莫比一釣鮪與鱣再釣魴與鯉三釣鯨與鰲生殺在釣餌失之何足羞得則良可喜今者得魚亟烹之婦曰有酒無憂矣湏臾爛醉卧蓬牕船頭雪深尺有咫酒醒推蓬一開眼茫茫萬境白扵紙乃知江湖之上多髙人借有駟馬髙車安肯起讐太公友嚴子何妨老作烟波士湖之濱江之澨書可讀榖可藝君將忘筌予避世紫荆關吾聞紫荆關是古來天險處勢逼恒嵩抗天柱棧路逈出青雲端岩瀑喧豗噴灑長空對之可以湔塵慮往年龍虎紛拏戰血飛煌煌萬騎闗前駐只今平世天下清千里桑麻斾斾連郊墅行旅不操寸兵甕城不勞銕鑄王元不封函闗泥孫子不書馬陵樹闗南孤戍夜火稀關北團茅小家住今我自西來飛霜滿衣絮林下有髙人怡然此相遇烟霞郵舘午停驂風雪軒牎夜聯句家山咫尺望不迷寫書先寄賔鴻去湏臾日車飛上扶桑紅一騎已出東山東正己堂登君正己堂聽我正己歌大質不返混沌死群邪乘正棼駢羅乃知正人必正己己既不正如人何惟彼古君子卓哉心靡他方正學嚴切磋敷正道貴漸磨吐正論排私阿誰其似之陳幙長壯顔毅色横星河秉心一以正心源澄朗無驚波居家一以正家人唯諾春陽和蒞官一以正官曹肅睦亡譴訶朱絃泠泠白日静玉樹皎皎清風多素絲羔裘粲如雪自公退食何委蛇乃知穹壤間細大理則那乾道失其正隂陽寒暑皆錯訛地道失其正山川草木皆札瘥人道失其正綱常典禮皆偏頗史之直汲之戇推强植弱横金戈明廷一日振風采凛凛正氣永與金臺萬古同巍峩湘中老人圖湘山髙湘水深樹淼淼湘猿吟日將莫翠霧丹霞滿芳渚碧草凄迷南浦春紫蘿摇動東風雨龎睂野客來何所袖拂輕飈過孤嶼埽苔坐讀黄老書展卷之間㑹此千古之竒趣九嶷飛翠空中來路遶蒼江獨歸去雲漫漫烟水寒日慘慘江雪殘浩蕩孤懷渺天末珮環飛上青雲端雲白山青互吞吐蒼茫隔斷來時路古人已逝等埃塵招魂不歸正愁予空留糟粕在人間地老天荒竟何補何時掛颿直上海之涯爲看湘中老人讀書處瞻雲圖朝出看燕山雲莫歸行燕山道道傍雲氣光動班爛衣千里飛來白如埽長天愁逈陰冥迷虚室宵清神皓縞太行一髮半落天之南翠彩浮空散文藻縉山更在天南之南海樹邊白髪髙堂歳晏驚寒早三年書斷安穩無每一思之心懆懆風迴雲杪思飄揚月墮雲西夢顛倒白雲半幅細入天機中寫出狄公心事炯炯隨雲照穹昊雲無心人有情物易化情難老朝看雲暮看雲縉山佳處安得乘雲忽飛到雲中人拂黃巾山中雲䕶丹灶從龍奮迅直上青天飛變化無方契元造天下蒼生正湏霖雨之慎勿栖岩扉閟鴻澤負明時松雪翁畫馬西海之西天地翕合敷靈氛天産天骨超崐崙月窟而東而北幾萬里是馬乃能籋星辰踰渤澥埽空冀北凡馬群曹將軍是開元以來善畫者蚤以絶藝動紫宸不問驪黃與牝牡筆力到處春無垠往時嘗見一二本世之畫者徒紛紛呉興學士昔在詞林館畫人畫馬咄咄能逼真玉堂朝日射碧瓦瑣忩晴雪吹青春文章之暇奉詔寫龍種冰綃萬幅清無塵此圖神采更飄逸妙處不減曹將軍飛雲滿空散靈雨五花凌亂曉濕蒼龍文人言此是明皇御愛者天香滃鬱飄滿身瑶池渴飲雪滉瀁霜蹄逈踏雲嶙峋黃鬚圉官似是太僕張景順自幼調馬馬亦馴想當牽來赤墀下皎如飛龍下天門山齋看畫白晝静丹粉如沐清心魂龍媒一逝九霄隔龍沙泱漭霜風昏縱今有馬無善畫誰與寫之傳世人吳興自有古作者髙風逺韻不可聞九原安得起公死請公為我放筆電埽層空雲陳君愛畫不弱南金與西玉百迴展玩當爐熏南金西玉可力致嗟此神物夐然獨立而無隣嗚呼神物為物固有神直恐變化為龍飛上清都紫薇之帝閽圼縣公并東判簿長司北方守令之才幾人得佀賢侯者炳烈聲光動朝野金莖承露曉蒼蒼玉樹臨風秋洒洒惟茂恭與遂霸侯也直欲躡足青雲攀逸駕三年理劇割牛刀生齒林林霑惠化風迴芹沼汎鳬鷖水滿稻田抽䆉稏花村社皷林邊撾茅店酒旗烟外掛啁啾絲管勸農歸杏花滿街紅撲馬五絃清響奏虞歌三峽崩濤飜鄴瓦去年上計如帝京䄂拂天香五雲下竹馬重迎郭伋來和風歡謡騰苃舍騰苃舍揚休聲談鋒磊落肝膽傾徃時辭家上䇿登轅門竒氣萬丈横秋㝠六韜三畧常在手擐甲上馬忼慨踐虜庭黄金散衆虎旅集紅旗渡海鯨濤平只今太平不用武狌鼯不鳴雞犬鳴况侯豈弟愛百姓東郊西社歌豐登邑有倅弼厥能幕有長贊厥成如此一時賢令佐不若同氣好弟兄三花葳㽔月窟静八牎窈窕氷壺清嗟宵人藉培育骯􅗣長軀但食粟孔融豈計酒長空鄭老惟憂飯不足負米歸來氣慘悽風雪連天遮草屋短衣破帽入新年抱子簷前曝朝旭喜隨父老拜旌軒生意昭蘇迴稿木山之隈水之曲石徑荒寒古苔綠拾薪莫逐嶺雲還脱巾時向松潭沐侣魚蝦友麋鹿牛角掛書田裡讀漢家史記滿床頭卓魯龔黄在心目直湏為侯濡豪沐槧紀循良留待班馬諸公親纂録琴堂曲為永清劉尹作琴堂清文忩窈窕雲霞明七絃彈出太古意光風遶郭流春聲滿天地泛羽浮宫蕩和氣惟侯之政亷而仁敷鬯惠慈湔暴厲惟公之心公而㔻擿發伏姦施愷悌視民如傷民徳之生意昭融一時寫作琴中趣堂上琴音沉沉𤣥猿抱月啼空林琴上絃聲淵淵老蛟卧雨吟寒泉有時拂軫青松邊白雲飛來清可憐有時度曲香案側水沉欝欝飄晴烟此琴不是相如之所蓄此琴不是伯牙之所傳乃是當時子賤古遺物置之茲堂今幾年縣庭無事簡書静抱琴危坐心悠然古風寥濶不可續侯也直湏為奏周詩三百篇世雖久乏知音者時復鼔之聊以陶吾天馳聲海内永不朽七閩山水萬古増光妍我欲學琴恨無縁我欲買琴苦無錢山空月白琴響絶把桮長嘯天風前送李希文典教東船里送君行君行直到東船里風物幽迴宛似江之南土壤肥夷可藝稷黍茫茫墟市隔林皋寂寂衡茅䕃溪水天空鷗鳥閒地古風俗㜫鏗訇教鐸振文聲子衿揖讓春風裡我欲乘桴直上海之涯魚龍掀舞烟濤起老翁曬網立船頭兒子义魚傍船尾灘聲奏曲響琴忩水風吹香墮書几先生宴坐清可人陶寫神情舒四體攜壺觴臨沼沚或開襟或洗耳或賦長歌詠古今或掉扁舟弄清泚世間萬事豈足掛心旌為問此樂平生還有幾我欲誅茆結屋與君隣我欲浮家泛宅學丹子雲水之間栖遲之樂可以忘歳年不知老之將至矣石鼔歌乾坤清淑之氣蜿蟺扶輿亘西極化作岐山之陽石鼔十六丁二酉剷斷崐崘之瑶峯縹緲雲根墮穹碧層崖秋碎方祗愁大星宵隕圓靈泣中虚不露䟽鑿文太素猶涵混沌質偉哉周家宣王中興時戈鋋彗雲九縣一明堂受朝群后來天威不違顔咫尺岐陽之狩載陽國之靈王氣騰霄何赫奕八鸞聲戞秋風髙九旗光動朝暾赤歌車攻詠吉日張皇維昭帝績㤗山盤石之祚炳烈千萬春勒之貞珉古無匹其形如鼔不可扣之鳴其體渾淪絶侣大造無痕跡其字遒逸宛是篆與科其文古雅髣髴周之什吉甫歌史籀筆制作森嚴照岐邑年多物化理則然金字半滅無人識老蛟摧裂野火焚古墨淋漓苔雨蝕青城學士昔在大德初見之林下久歎息入朝亟爲丞相言如此至寳何可以棄擲大車彭彭輓致來孔庭天地風雲亦動色我嘗愛此十鼔文字竒撫玩摩挲不知日之夕荏苒光隂數十春春風吹愁髪生白近時再過石鼔旁階草蒙茸没雙屐細看字畫轉么麽徙倚廻廊淚沾臆東安鄧尹彈琴青桂林議論文章脱塵俗平生好古如古人直欲蒐抉周秦之故實里中更有朱先生白首著書窮日力寄書逺訪石鼔文細字滿箋珠的皪書中宛宛見髙情識者見之争愛惜乃知先生好古不減吾鄧侯吾徒委𤨏豈復如先生喜新厭舊猶戲劇吾友秦郵李希文新來小篆亦傑出夷門梁君子宜苦學張顛之草書電埽千軍爛如拭我生雅恨不能書每見名家如有失朱先生古遺直甚欲相從不可得山中茅屋書滿床何時一到虚軒分半席直湏和我石鼔歌戰退蘇韓入堅壁嗚呼古之作者徃往苦用心豈惟杜預雅有春秋癖今人無復見古人徒勞紙上賞遺墨魚目滔滔久混珎後來此鼔誰収拾燕之石等圭璧荆之璞同瓦礫古風不返天茫茫何如爛醉林皋卧苔石雙節詩明山清鄞水碧山水之間好田宅宅前華表髙出青雲端金字雙題燦星日秋窓隔樹霜燈明白髪婦姑宵紡績水寒績斷心緒勞門掩淒風抱兒泣風吹兒聲轉飄揚愁雲壓樹墳草黄夫君骨已化青天杳茫茫炳烈千古心逈隨白日懸穹蒼弓冶傳家好孫子丹桂滿林吹古香異哉一門兩共姜至今大江之南奕奕有炯光我嘗考古節婦為傳記積雨林扉散秋氣雲開日出海霞飛萬丈朝暉射天地無情滄海枯惟兹節婦之節古難敝我生也晚無復見古人唐虞世逺虚歔欷安得鞭豐霳呌閶闔箋皇穹盡令薄海内外迴淳風雙鶴吟若有太古之仙迺在瀛洲之上方壺之間門前雙鶴不知幾歳月雪飛風舞逈隔青雲端天空月白雙影静玉笙合奏瑶臺寒石壇暝踏松子落林蹊晴啄苔花殘仙翁手執相鶴經一卷逸思汎若孤雲間興來引雙鶴笑入三茅山三茅山中瑶草碧九皋雨散春烟濕鶴飛亂㸃層峰青彩鳳蒼鸞往往與相識價重不減雙南金質瑩不弱雙白璧不慕懿公之華軒不逐王喬之飛舄不巢西湖處士之孤山不憇黄州謫仙之赤壁棲紫霞䕶丹室六翮稜層曝朝日友茅君呼木客盡日聽琴香案側山中之人問訊時相過蟬聨飛遶羊公石鶴之逝風翩翩遥空雲落秋無邉鶴之返山娟娟紅塵不到芸窓前恍如元方季方在潁谷倐如陸機陸雲來洛川燦如同穎之禾敷秀唐叔壤宛如王雎之鳥著美周南篇薛公之鶴何其夥趙抃之鶴何其偏異哉兩仙骨不偏不夥全其天問鶴往時託巢在何許邈在遼海之東華表柱問仙豢鶴到今凡幾春前五百年嘗與令威一相遇鶴飛來向何所不渡海之涯不渉江之浦直欲飛近天上神仙之官府天門寥濶不可通誰到十二瓊樓最髙處莫延佇鄧林之廣豈無一枝之可栖何為乎渉雲霄冒風雨春去秋來恣軒翥仙亦竟不留鶴亦更不駐山耶鶴耶笑我䠥􅍷扵風塵相隨直上青雲去蟬嘒嘒蟬嘒嘒老樹秋風暑初退閨門忽起思婦悲欹枕聽之墮雙淚去年夫征淮水頭天明上馬操戈矛今年夫戍玉關塞日夜囏危誰足頼不如爛爛雲錦機織成迴文製君衣不如湛湛長江水流恨隨君千萬里白首㑹面知無難願君竭力軍旅間太平無事荷帝力遲君歸來慰家室鑿鑿之石如妾心空山絶磵秋嶔崟青山之松如妾操大雪嚴風不凋耗石或可轉松可摧妾心萬死不可囘暇日與客出忽大雨倉皇無所避頃之聞市中小屋呼曰晴搴裳渉水就之主人欣然相留俄而隂雲四豁紅日青霞閃映可愛但流潦如奔泉平地成大河時小兒六七浮木爲舟作水嬉因以木閣水際度坂塗踰數十舉武憇楊秘書曼卿先生家将歸雨復大作又憩僧舍至晚不可留也乃歸明日賦其事與客一笑時年二十四黒雲如山白雨傾神怪出没雷電驚走避人家屋簷厎平地成河斷人行此時惟我與一客只恐水深歸不得疾風吹樹如捲濤城上飜飛墮楓葉劃然開霽天色寒五鳳樓閣青雲端河橋酒旗曬斜日恨無千錢此盤桓褰裳涉水泥到膝倉皇不復辨南北市人如螘歡相呼古濠積潦深三尺秘書宅前芳樹林翠隂滿地何蕭森主人愛客欲少住鮮飈入閣開煩襟出門復憩秋水寺四顧徊徨雨如霔天昏地黒蛟龍愁我行如渡銀河去安得渥洼龍馬駒乗之白日朝帝居只今汨没在泥塗非癡非狂亦非愚人生天地亦寄耳晦明變化知何如度居庸歳暮矣風凄凄車中行客胡不歸一車南一車北南来北去何時息車行欲近關上頭鞭牛不前吁可愁須臾推挽在平地車中兒女歡且謳短褐蕭蕭風雪裏山徑荒寒多虎兕呼兒取火供晚炊瓦鐺黍米和沙煑黄昏露宿官道邊茅店雞鳴載行李殷勤起謝車中人萬嶺千山多苦辛嚴風吹霜皮肉死一身只有筋骨存安得筋骨化為山下土填却千山萬山無險阻盡使行人免愁苦贈周掾楊震辭金亷以公釋之審讞仁以忠誰其佀之君卿氏直與兩賢齊髙風周公善政乆頽敝秦漢而來由吏治煽威作福誰禦之如以蛟龍視螻螘君昔試吏西曹時以亷律身人是之豈不知蕭相曹侯稱畫一當時皆自刀筆出上緫戎大將軍出沙漠萬里河山盡開拓馬嘶紫塞霜草寒鴈飛白海烟濤濶旗拂戎帳空箭穿魯縞薄虜其名王歸四面凱聲作功成獻俘蒲萄宫天青日白開鴻濛遂使樓煩林胡之遐壤化為冠帶衍為提封明年草青春色濃征人解甲醉卧林花紅我恨不識趙充國又恨不識塞上翁㧞劒起舞歌春風大雨喜晴奉贈巖樐賢尹蘭莊廣文鳳臺之行昨日雨方休今者復大作蜚㢘鼔槖震霄衢淵客泣珠送谿閣白海飛流紫塞空銀河倒浸青天濶三闗遥九源合舟迴誰復辨渚涯郊行何處尋墟落稻葉青起風幡幡野田緑滿水活活吟卧聽琮琤樵歸迷畧彴蝸廬一片林烟昬雞塞千營氊帳薄雄縣城中百數家東街西街平地成溪壑瞻飛龍聽鳴鶴吾獨胡為久困泥塗中何不乘風破浪從此以揮霍破室燈昏仰見天一夕九徙不得眠大兒愁衾裂小兒嫌履穿芸窗外内滀潢潦葵砌髙下奔清泉虚牖風顛亂舞壞墻泥墮髙帽偏衰翁避濕龜頂縮穉子擎蓋鳶肩旋滂沱急鳥鼠穴紛霏亂㸃虫魚篇劃然快覩好晴景金臺千仭青雲端埽棊局揮酒錢酒邊舞影何蹁躚何蹁躚欲掀舉花縣芹堂捧幣函香覲鶴籞丹心炯炯照皇穹縹緲祥烟飄鷺渚看君増秩賜金歸盡把鴻恩化作溥天之膏雨一山文集卷一
