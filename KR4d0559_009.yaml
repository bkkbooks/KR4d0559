body:
  text: 一山文集卷九元李繼本撰雜著書劉禹卿傳後昉盗起兩河四方才武之士倡義討叛者多其後禍亂以次戡定朝廷賞功之典亦既行矣而今之居閫府緫戎麾縣方寸之璽提百萬之衆操生殺誅賞之柄坐鎮一面俾烈勲垂聞蔚然列將臣師臣之任者當時兩河討叛之士不多見抑有之或沉抑下僚弗獲振奮有為以功名顯非他人固有遇不遇耳余素聞禹卿名恨不識其爲人近逰畿東過三河始與之定交乃知其為才武之士洎讀夫今中書叅政危公所為傳見其書禹卿爲通州團結萬夫長時民有傅四十者盗殺其里人曹珪禹卿素與珪善聞之憤不自勝即畫計捕四十與其同惡若干人誅之扵是知禹卿不特善其職勇扵義也嗚呼當中土弗靖時豈無雄傑生乎其間誠得若人者數十輩以討伐之任元元之害必不至是烈也惜其才武兼人而弗獲振奮而有為余前所謂不遇者非耶抑禹卿之不遇庸何傷哉譬之龍泉大阿沉輝匿采使遇神識之士出之塵泥則燭牛斗剸犀象斷蛟龍無難也矧叅政負知人之明操人物之柄惜禹卿之不遇而傳其行實之詳意寜無屬乎禹卿自此升矣一日事業聲光照當世煥然如利器之出非禹卿吾誰望故喜而書其槩其詳則具扵傳中書武備寺知事鄧彦文房陵使還詩卷後吾元六合一家幅貟廣長極扵海宇曠代所無也余嘗覽輿圖而嘆之以謂雖使壯而至老而轍跡所及詎能歴其半哉當四方晏熙諮謀度詢之日使無虛譯而荒區絶域罔不知聖天子威惠之布一旦妖盗構釁糜爛吾民通衢大邑蕩焚尤甚王命弗通扵兹十稔矧阨塞險逺之地哉房陵邈在江漢之間晉陽髙公首建義旗募兵屯守以遏隣冦迄扵今拓地方千里水陸支黨不敢潛闚邊壤而民頼以安至正十九年冬朝廷以公封守之功益大以著迺遣使徃布宥命開以更新之路扵是鄧君彦文由京東安撫司照磨擢武備寺知事承命以行自京師抵房䟦渉萬里山川阻脩莽焉豺虎之區而君恬不介懷休暇如平日至則敷宣德意明白洞達父老子弟莫不振厲感泣思見太平之治厥績偉矣竣事將歸髙公首為序引以榮其行而房之人士復贊詠之得詩文凡若干篇君歸出以示余余作而喜曰古之遣使以將王命廣聪明也夫子之言曰使扵四方不辱君命非為使之良法歟况自兵興來名藩鉅鎮之逺使臣之將命者每不能一二至焉使幸而至之或恇怯退巽鮮能弗辱君命也今君之出使不獨俾十餘年阻化之衆知朝廷威惠之及猶一日至使衣冠文雅之士歆豔贊揚之恐後必其才識超絶有足以動人者矣其曰不辱君命亦君之餘事耳然自房而北而南而東征討弗及檄傳不通尚多有之安得如君者徧歷而周至俾四海九州罔匪王命之所布哉代䟦蕭叅政與鄭伯興書後世有受人之恩而背馳者烏可縷數矧能以其善行暴之之人哉曩賊犯閩壤叅政蕭君軍處州伯興府判守政和兩君崛焉犄角之其籌畫措注多見之書問中後處䧟而叅政死之今閩人猶能語其事而伯興之於叅政尤惓惓弗忍忘每一言之涕泗被面間以其遺墨裝潢成卷因顧夫何先生來京什襲而付之以求才大夫士之題詠觀其詞語慷慨肝膽披露隱然盡瘁許國意一開卷間想其英風景烈凜凜如生是叅政雖死猶不死也自非伯興之賢顧兹遺墨數值亂離得不與土苴腐敗耶幸或存之亦蕪没扵塵編蠧楮之中耳今之寳之扵家而復暴之扵世期以不泯夫人之善焉崇古道也然伯興在政和時特與處為隣壤而有輯睦之好耳初非受恩扵叅政者也其相與之誼猶死生以之彼有受人之恩而背馳者聞其風獨不顙泚耶嗚呼習俗一頽古道靡矣若兩君者其皆一時之才傑而不為世變之所移者乎至其忠誼之節炳炳如青天白日群君屢贊之不重書也今年夏末何先生出處卷徴題時大暑如焚筆硯久廢諾之再旬未遑作雨後秋氣滿襟頗有清趣乃掇作者棄唾題其楮尾如此至正丁未七月望題鄭彦文所藏墨梅太素鍾其質太和全其氣囘生意扵萬物之始涵造化扵一陽之際風霜同其縞潔江山助其靈異羅浮庾嶺乃其寓也金鼎玉堂乃其遇也東封大夫淇園君子乃其平生之契也宋廣平賦林和靖詩烏足以彷彿其一二也獨慕夫昔之人因此以見太極謂問諸先天之伏羲氏也題卞庭芳所藏山水畫右山水小畫一卷予故人子卞庭芳氏家藏物也予夙有林壑之癖而好事者謂天下名山水莫勝扵東南而東南之名山莫勝扵吳越士生海内晏熙之時不及夫壯齒以覽觀江山人物之盛則有後之悔而老將至之慨予用是欲效司馬太史萬里㳺觀一徃以寫其竒既而牽扵形役不可得也先是予先祖平章楚國公仕吳中先公左丞持地官卿節董漕扵閩其歸也猶時時喜道吳越間事用是知惟閩浙之交可以當江山之勝登臨之美逰從之樂外是不一二數也予近歳如金陵通京口登石城訪鍾山草堂求舊時名勝則皆寥閴而無聞已而夕陽在樹山青雲白宛宛可畫而二三故人之同旅者取酒過予舟中相與岸幘放飲感慨悲歌指山川人物而論之謂昔之過此者有能以事業文章表見扵當代乎今之來此者有能以清風髙節振厲扵不朽乎予今白首浪跡江湖又不知後是數十年物論有無有能儕我扵材不材之間乎矧夫百年之身其有幾何顧以金石之質而放情山水之間以永其樂以盡無涯之世變亦惑也惟夫人之不以生存而死亡也故其所以播霄壤而照冊書者則在此而不在彼也是故江山非美以人而美金石非夀以人而夀觀乎九鼎之弗淪十鼔之不東山之絲竹猶傳而平泉之樹石固在以其人不以其跡也其視後人放情山水間而不能以一藝自名寓形宇内而不免扵遺譏千古者亦獨何哉庭芳之先君子仲和嘗為定興邑尹以病卒扵官邑之人迄扵今思其惠愛而不忘也庭芳與其弟德芳好學而文以世其家尤予所愛重故書是以識嵗月洪武壬申春三月丁亥前王宗嗣榜第三甲進士李延興書是日清明題獨菴外集後浮屠氏之學寓乎空寂泊乎清寂歸乎廣大而不浮出乎生滅而弗梏始終乎性善而不事扵芟夷初非假諸言語文字而為學也今年夏初訪獨菴禪師扵慶夀丈室時宿雨方霽清風自松下來襟袍為之澄朗師出其文一編示予其言簡淡而髙深讀之神思飄逸而超然欲飛蓋綜核古今人之製刋落其凡近而輘轢夫冠絶者非徒作也予因請扵師曰浮屠人冲虚而無外渾涵而無涯瑩乎其無緇而逈出其無隣一源湛乎中而放之扵無垠諸有生乎想而㑹之扵無心萬變至乎前而屏之扵無聞師之學蓋自得其得而非積盛致然也師何汲汲扵文辭為哉古之作者著之六經而散之九流百氏與夫天文律厯山經地誌下至稗官小説紛紛籍籍汗牛而充棟天地一糟粕也苟或窮日力而繙閲焉貫穿上下而淬礪焉鏤肺雕肝鈢心劌目以耗其精魄焉吾懼其淆濁吾性海㝠迷吾法界非學也矧吾祖師言佛非由語言文字性在是耳師何汲汲扵文辭為哉師囅然而笑曰世徒知有言之言著之文辭而不知無言之言黙契乎道妙知雕䖝篆刻之為文之境出而不知不得已而有言之文之獨得也故天不言而日月之照臨雲漢之昭囘皆文也聖人不言而道徳之光輝經緯天地皆文也故能言之士以其不言之言吐其精華而炳耀乎篇帙其始也運乎冲漠之虚而窮乎泱漭之野其終也超乎筆墨畦徑之外而貫乎萬象呈露之中不敷暢而究其㫖歸不階梯而闖乎堂奥不繪繡而黼黻其文不宫徴而韶濩其聲其多也聨編累牘而莫有紀極其簡也一轉語而三千大千盡其模擬此之謂不言之言也予聞其説則復扵師曰師之文出有而入無予何庸置喙其間哉予將訥其舌而絶其言矣予獨念師不鄙謂予而能以文事引掖予也因觀其獨菴外集題其槩而歸之師今年實洪武庚午也是年六月十有六日李繼本題䟦學生於徴劉素賦藁古之大夫有九能能賦一也夫自聲詩出而始有賦屈子之騷三百篇以還崛為詞賦之祖得乎風雅之意也司馬相如揚雄班固上林子虚甘泉羽獵東西都之製作雖皆流聲無窮至律以騷之規律瞠乎若後塵矣然子雲論賦謂童子雕䖝篆刻壯夫不為又曰詩人之賦麗以則詞人之賦麗以滛陸機則曰賦體物而瀏亮雄之言是矣機雖有雕琢之才其為賦不過體物瀏亮而止矣豈知古人之賦哉左思賦三都締思十年門庭藩溷皆著紙筆苟得一句即便疏之禰衡賦鸚鵡攬筆而作文不加㸃則有對客揮毫之捷焉然則思也作之難衡也成之易人皆優衡而劣思而余扵思之賦每斂衽讀之扵衡之作有不屑也余至淶陽親夏楚事其徒曰於生徴劉生素始誦論孟訓故漢儒訓故文辭即訓詁也而鄄宋先生世貞乃以聲律之學教之先生啟廸後學而必其速化也蓋有所見矣豈世之迂儒可與言哉余觀兩生之賦雖無學問以大之然其好語亦時時間出味其詞意皆自先生三百首梅花詩中來遂進二生而告之曰楚漢之賦尚矣生也豈能一蹴而造其堂奥其經余之㸃綴者不過塲屋聲律之習耳二生當積學以大之其必如屈宋如相如揚雄班固左思之雅製斯善矣兩生其勉之乙卯嵗四月維夏日䟦䟦仙人吕岩圖像予􅉨嵗樵牧龍門山結屋萬松之間岩谷静深雲物晻藹而風氣髙寒不知吾身之在人間世日與山中人采芝术弄泉石久之欲絶榖導引餌刀圭鍊神魄以㳺乎方之外而未能也是時有道士居西山西鬚髪盡白而氣骨清徤三數日輒一來來則歗歌林下留連竟日而後去問其姓名則曰我無事乎名我何以姓名為哉其言誕幻而渺茫説神仙事甚竒怪人或讓之曰世果有神仙若安期羡門者耶道士嘆曰邃古之初未始有物也有天地而後有萬物則萬有皆生扵無而歸扵無故不物扵物而不爲物有若然則吾之所謂有子安知其無子之所謂無吾又安能必其有耶予不見道士二十秋比嘗一到舊時樵牧處問道士何所之而山中人無一在者豈其㧞宅上仙耶近過薊門宛平邑長任侯子勉出示横披一幅蓋仙人吕岩飛渡洞庭之跡觀其筆意蒼勁神思飄逸風濤渺漭萬頃一碧而劍佩焜煌飛動扵雲烟杳藹中一開卷間使人翛然有出塵之趣可謂竒矣嗟乎神仙之有無吾誠不得而致詰已而考諸列仙傳所紀古仙異人之蹟則知昔之人蓋有鍊形而解化者用是知神仙之可學也雖然使神仙而可學吾固未暇學使其不可學吾又何用學仙為哉因思徃時道士言則知誕幻渺茫之事孰有而孰無耶侯襟靈坦夷望而知其為神仙中人且其政務清簡一邑號稱無事蓋所謂神仙官府者一日考績上上為郎官為御史入覲天子之都人孰不曰此行何異登仙耶必也飛馭八極凌厲光景以候安期羡門扵寥廓吾恐見笑扵列仙之儒庚申嵗冬十一月十有六日漢水李延興䟦䟦廣平諸君子贈史生公叙詩引後予足跡半河朔所見晚進之士以學行表著扵時者千數人未見其一二豈有之而未遑梯接歟不然何落寞無聞為可慨也近過雄邑士子史公序天稟醇粹而襟靈坦夷且扵聖賢之學益肆其力蓋嶄然秀擢乎等夷而與北平李繼鼎齊驅而並駕者安得謂之無其人乎前十五年予在薊門嘗識公序時尚童丱孰意暌隔之久而氣質變化如虎躍而鳳翥炳炳如是哉公序幼從沙河張庭瞻學後從保定武先生學又其後從廣平呉士英學用是知師友啟廸之功非一昕夕所可造就而其學為有源委矣予僑宗人好問所凡十日留公序時復過從慰予風雨寂寥中洎歸復遮留道左睠弗忍别乃喜而告之曰士積學勵行將以壯行扵他日非直弄文墨摇口吻釣聲餌利以矜眩乎庸衆人而已四代之書燦如曜緯之麗天公序其亹亹不畫以詣夫髙明光大之域俾徳業聲聞著當世予之望也師友之願也宗戚閭里之光也公序其勉之歳己未秋八月七日安次李延興䟦䟦深州學正趙君伯欽先考墓銘後士之懷瑾握瑜不幸汨没泉下與草木同腐敗者古今人不異也若夫聖賢君子道徳文章之著豈區區智力之鑿遂傳不朽耶必其子孫而為之紹述師友而為之發揚得其人而托之爾其或道徳之可師而史傳之蕪没也文章之可貴而簡編之散軼也布韋之士掇什一扵千百又不啻太山一毫芒也幾何不與草木同腐敗耶譬之象犀珠玉世之所謂珎玩也使非瑶而秘之不一朝而横棄道側耶用是知道徳文章在得其人而託之者審矣故孔子稱泰伯至徳夷齊求仁得仁發潛徳之幽光也揚子雲著太𤣥人皆笑之惟弟子侯芭謂其師之書勝周易韓愈之文與孟氏揚雄上下宋初天下學者未嘗道之惟歐陽子首倡其説謂學者當至扵是而止爾推崇作者之功也深州學正伯欽趙君世有令徳家傳正學至七世祖開當宋南渡時以功贈開府其後為州守為郡博士為縣文學者代有顯人故近世論江表望族必歸之臨海趙氏云伯欽之學宏深典奥詩與文視漢魏名家無愧予嘗質諸作者亦以予言為然是嵗北平鄉試伯欽以七月之末赴彌封官之選道過瓦橋訪予風雨寂寥中已而出其先府君墓銘相示讀之悚然起敬乃知衣冠詩禮之家道徳文章播穹壤而照冊書有由然哉因斂祍書此或者韓歐可作必能張而大之無惑也一山文集卷九
