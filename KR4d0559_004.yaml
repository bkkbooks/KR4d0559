body:
  text: 一山文集卷四元李繼本撰闕邱一壑得以耕釣而自適東阡陌得以杖策而往來搢紳名公之過之者得以禮於其廬小子後生得執經以從先生遊是侯之出處去就皆可無憾也乃書以贈之送北平知府方公序嶽陽方公伯禧尹北平之三年上計如輦下其南轅也豫詰旦與之别且致辭於公曰北平居王城下邑大府綜有司庶物而尹之為職寮采之所視效州縣之所繫屬民吏之所仰戴求其公私無撓外內相安職職而事事非易為也故飭身之不謹則軌度之寖弛治事之弗鍊則上下之偷容待物之弗宏則謗讟之踵至是職也在朝廷雖不以之輕授而世之紆組綬建牙纛揚揚如政事堂美食而安坐者其可視為易事幸其滿秩而去汲汲猶傳舍然哉夫天下之才其髙下細大不一也譬諸馬之為駿必飛黃緑耳然後足以驟康莊行千里否則恆見其豗隤而𤣥黃非駿也木之為材必松楩杞梓然後足以建明堂構總章否則卒至於風摧而雨剝非材也公英年登上第人謂其學問政事杰出一時視昔之為尹者未見一二與之埒是何也學問政事同出於士而士之軼類而絶塵立功名以垂霄壤則亦幾何人哉公襟宇洞廓故應變疏通而裁决無壅滯譬之於馬其飛黃緑耳之駿乎公德度凝逺故接物周洽而惠愛無偏頗譬之於木其松楩杞梓之材乎今之往燕之耄倪皆遮道挽留而恨其不可得才大夫皆相率賦詩以寫其遺愛而徴豫為之序故特書其學問政事使士之讀書學道者皆曰公之學由淬礪而出是固吾之所當學由是讀書學道而出仕則公之學不私于一身矣士之居官食祿者皆曰政由學問而致是亦吾之所當學由是致君澤民而無負則公之政不私于一方矣是公之學問政事非以自私而亦非私於人者也公其勉哉由是居政府理憲綱振勵天下使士風為之丕變將不權輿於此乎豫於公相與未久而相知最深故言雖涉於太蕪而情非出于溢美若其政蹟之偉可以上之太史而儕諸古良二千石其詳見於計吏簿中不書懼復也送李慎言赴順義訓導序洪武壬戌秋薊門李慎言氏將有順義之行典邑校也今左春坊大學士安常董先生時為宛平文學掾為序以華其行而燕之才大夫士形之歌詩以贊詠之者前後相屬也先生之意大要謂堯舜周孔之授受周程朱吕之論著其書詩書禮樂易春秋其道仁義忠信叙五品以植民彛之則萃萬善以盡事物之變究三才以通天人之運自灑掃應對以至精義入神自格物致知以至明善誠身其終至於篤恭而天下平體用詳明而表裏融貫本末兼該而細大包絡其道一也然道非可以言言也故天不言而四時行百物生聖人不言而六經之載道如日月列星之文昭被九宇其或規規焉取諸言語文辭簧鼓以為說采色以為飾刮磨雕刻以為姿狀則凡糟粕之學濫觴之傳口耳之見皆可以為道矣其能垂教於不朽乎慎言邃學而文其於聖賢之經之傳子史百家之書考索之専淬礪之至不泥於傳注不膠於事實不淆於白黑據其塗而涉其津豫以是知慎言可以語道也誠以是為學為教則凡請業請益者不由是闖其堂奧乎學禮學詩者不由是以飾其言行乎而治己治人者不由是以為規矩凖繩而終至於大器乎吾友宗一氏與慎言最稔與豫先世皆河南人國朝皆占籍北平兹以順義文學掾攝校於雄與豫共事則豫三人者皆里閈皆久要皆同道也况順義違雄踰十舍乃不以其津陸之逺寓書宗一以徴豫文豫故不讓而為言以竊董先生之緒餘以為數十年之雅談重宗一之請嘉慎言之嗜古文辭而不自畫也贈醫士婁傳道序薊邱劉明善氏纍葉儒官家自兵起兩河幽并俶擾挈家避亂江淮間其後族戚蕩散父母妻孥先後死又其後中原甫定完一生於九死中又其後得北歸鄉里再娶以有家室年四十始生一男今尚乳也先是天大暑沴氣方熾兒右腋間瘡忽坌起兒瞶亂不帖席者數晨夕其勢危甚明善與其家人驚悸莫知所為鄰里來相視亦莫知所為計則皆曰明善仁厚人閲播蕩之餘以有嗣𦙍而祖考之血食其不絶猶一髮今而若是天之戕吾善類不亦酷乎時東浙婁傳道以醫士侍直燕邸良師也明善於其休沭之暇禮延於家乃診視兒曰此醫所謂丹毒也蓋小兒為陽火亂攻氣不得上由是蒸而為毒乘虛而傍出傳道取藥一匕飲之食頃而愈於是舉家歡然若更生明善乃卜之日吉具酒饌賫楮幣以致禮焉酬其德也傳道曰吾聞父師醫以活人為心非若市道人覘貨利而取其直也苟規規於貨利是以貨利視其人非吾所聞於父師者也傳道力辭不肯受明善曰心內也利外也先生以活人之心而獲報而吾以報德之心寓之於禮意以報之於先生非所謂利也先生之受之實甚宜况吾之子始雖遘疾而終於勿藥是先生之俾吾有子綿吾宗祀也先生何為不受傳道曰辭其可受而受其可辭二者皆非也傳道又不肯受已而明善復再拜以請而傳道辭益堅明善知其終不受也則謂豫曰吾兒之不恙是傳道之肉骨我也吾宗祀之弗殄是傳道之引翼我也子名能古文願有述以著其德之不可忘焉豫曰君子贈人以言言固將暴其德而垂之以永久也傳道以醫為學非世之醫家者流比也考之周禮有瘍醫而史稱扁鵲嘗為小兒醫傳道有得於是矣故其操活人之術而於利不苟取焉其所以揚今而視後者將不在是乎雖然德於人而不圖其報者傳道也報莫之施而不忘至德者明善也豫故牽聫以書以歸其美於二君焉古之道也古之道不苟毁譽於人豫聞之韓愈氏云爾送劉御史榮覲序豫友劉榮覲氏弱齡從豫愛其刻苦嗜學雖甚風雪每杖策至其廬居一室門巷荒寒誦讀自若而林扉暗靄中隔樹聞吾伊聲宵則焚膏繼晷至漏下十餘刻乃始就枕平居非有疾病醫療祭祀賔客事其於聖賢之經之傳未始暫焉不接乎目絃歌之趣之樂未始曠焉不接乎耳而於師之所傳也已之所受朋友之所講晝夜之所思研深燭微期於破扄鐍開户牖闖夫仁義道德之奧則又恨其力之不武也此皆榮覲所自得豫嘗謂之不獨嗜學如是至其才識超絶衆皆望洋而自失故其相從曽未一朞也而景行先哲慨然有生晚之嘆已而領鄉薦試禮部皆預髙選佐名邑拜御史皆赫赫有聲使榮覲為士子時雖不從事科目以取富貴而學問文章亦足暴於當時迄於今光顯無疑也豫山林二十年所與逰不啻什百而風誼閴寥友道淪謝而竒偉不羣之士落落在人耳目如吾榮覲者不多見也今老矣精神衰耗志慮銷落譬之空山之木煙仆澗河雨臥溪谷無幾何時腐朽隨之矣則夫天下之士於豫何所仰賴而託交於暮齒乎榮覲方當英年其取友也不獨求之一鄉求之一國求之天下等而上之以求之於古則其所友者豈不可以想見其人乎矧榮覲由文學起家故其入對大庭而議論風采聳􅏒臺閣炳耀士林其有得於賈董之才猷乎出佐民社而善政所暨得一邑百姓心其有得於陽元之仁惠乎立殿階吐正論回天聽其有得於歐范之風烈乎惜夫豫之固陋不足以知之不足以言之也聖天子憫其親之老而賜告歸省其至也秩秩乎家廷之儀衎衎乎孝友之風而恂恂乎鄉黨之敬豈直為里閈之美宗族之慶父兄師友之榮哉孝於親忠於君而忠孝之行聖愚同天古今一轍也榮覲還朝且有日期於佩仁服義樹勳立業不負乎君親之望忠孝事也榮覲勉乎哉祭酒胡先生今人之望也於榮覲為先輩故其奬勵之有加於豫為舊逰故其好愛之甚至其詳見於送行序中豫故喜而書諸座右庶以慰久要不忘之情而江湖萬里之思也乎鄧伯言玉笥詩集序豫幼喜詩十四五時從鄉先生學為五七言詩每出一篇必曰是子可教由是専意於詩詩日煆月鍊不輟也今老矣藻思荒落詩久不作作亦不工思古人之不見悼斯文之絶響每廢書而永慨大抵詩之體裁各以其類雅頌有雅頌之製風騷有風騷之製漢魏人則漢魏人語六朝唐人則六朝唐人語譬諸公輸子之成方圓必由規矩師曠之正聲音必範律度而庖丁之解牛必中肯綮故其詩髙者薄霄漢深者溢河海振之沮金石奏之諧韶濩由是而薦郊廟感鬼神廣聲教移風俗振古不可廢也西江鄧伯言先生以能詩鳴東南其名玉笥集者豫因其北來得而讀之大抵本之於騷雅支葉魏晉而於杜甫氏則其専門也先生道過於雄留邑校信宿其隙也為豫言詩豫為之傾耳以聽其于古今事勢之變山川人物之異是非得喪之由興衰理亂之實一寓於詩而和平之音愁思之聲歡愈之辭窮苦之言合乎體裁而無偏頗之失當兹風雅閴寥而有此古製何異聆空桑之瑟於瓦缶紛擊之餘乎豫以先生不以庸愚遇我又念其行數千里之逺歷嵗月之久而忘夫道途之艱羈旅之勞也故為其詩集序送太常太祀張敬方任滿序太常掌郊廟社稷之禮古大宗伯之職也嘗讀其題名而見文學聲望之士彬彬接武後先矣張君敬方以䕃補入官再轉為太常太祝凡在同官愛其質美而行修方與之優遊共事議論考索用禆禮文之闕一旦以秩滿而謁選天官也皆戀戀不忍其去遂送酒載殽盛賔客以餞之酒行有言於列者曰夫官使得人則職修而事治故上自宰相下逮百司有軍國之寄黜陟之柄甲兵金榖之務於是人之能否可見焉太常則異是其職雖重其務至簡至有事於大禮也始克奔走奉職於其間否則優遊暇豫經旬不一署文牘非如宰相之與有司有軍國之寄黜陟之柄甲兵金榖之務也然則居是職者借有兼人之才亦將何所見而何所徴耶有解之者曰萬石之鍾不待較而知其有容極其量也千鈞之弩不待發而擬其殪兕極其力也觀人之術即其抱負可以驗其設施奚庸以已試未設而必其能不能耶敬方以宦業名家其於政事蓋自其事父兄師友之餘己耳濡而目染有不待臨事而可見者宰相以之從事於禮儀而不欲其親百司之細務蓋將培植其材而期之以逺大也國家制禮作樂方將徴禮典於文獻之家敬方以有其才而適際其時奚華要之不踐而功名之不白於是衆賔歡甚洗爵而起曰斯論善願有所識遂書以為秩滿序送王經歷使廣東序余少時聞里人王惟善君掾荆憲有聲恨未識及壯從薦紳先生遊聽其較論古今人物咸以君為才世之名一藝擅一能者不足比數也於是益以不及見為恨至正十九年冬君以使事至京適㑹故中書左丞伊埓森布哈公之門一見如平生歡公之子丑仲禮氏與余至契不妄許可為余言左丞為四川右丞時惟善為左右司都事雖政務至劇而處之裕如衆稱為幕府第一余聞其言益信後惟善調國史典籍余亦由詹事掾為太常奉禮則又同日授除由是往來相親商論雅道志同議合未始一日置也然自聞譽逮識君幾十年自始識君也迄今又三數年以幾十年願見之切僅獲三數年情好之密豈非難歟今君聲藉甚倍往時什百方期入贊政柄罄布矣未幾宰臣奏入山東河北下四方之未附者以次入欵非一切宥之何以惠活元元哉二十三年春遂大赦天下選文學之臣識通變者分道往諭於是擢君崇福司經歷使廣東余以相與有年不忍一旦别去中國最逺昔國家之一宇縣實始要荒矜恤黎氓至仁畢逹雖在僻壤治罔怠缺所以保養生全革心沐化不忍視為外逺而鄙夷之也及乎宴熙之久中朝之士不樂外仕者多朝廷念逺人之失治每授官比常秩增兩階以優之由是吏乎其土者志在􅗲冒爵名於靖綏之方漫不之省甚至賊殺其人若禽獸然故其人憤惋竊發依阻㺯兵劫官府􅑒城郛以肆威熖莫可猝制也君措慮周逺治事明鍊至則必能殫竭心膂宣揚國靈於逆順利害又必能辨析無隱行見顓蒙挑釁之衆振厲感泣潛鑠姦慝以拭目更新之治且指而誦之曰中朝有人如此其於恢復之效不少贊乎且古昔立功者不在朝廷則在邊隅余於君生同鄉交同好入官同進用庸敢以是祝之君其無負茲行哉是年月維夏十又二日序備荒雜録序漢史書張良謝病辟榖惜其法不傳蓋亦托言云爾其後方士者流往往能神其說於是丹藥之書出焉世之險辟之士復效其法而修鍊之謂一餌其藥可以終身不食而長生久視噫以吾眇焉血肉之軀非有得於保真養性之妙也一步乎詭誕之說遽以為祕訣而用之以求不死世寧有是理耶晉鎦景先表進辟榖方名曰救荒仙術見活民書最詳往嵗京師饑士民家多製而服之悉無驗兹豫所因製者因竊思之人之一身胃為之主胃實則氣充充則神完而不死詎有絶去水榖使胃虛腑􅉵而能久生者耶然則昔賢謂刀圭一入口白日生羽翰何也此蓋學仙之說也其法本於製鍊形魂使氣質銷鑠而陽剛純全如天之輕清其氣上升也其為刀圭也豈方士者流所謂修鍊之術哉余亂後躬耕山中見溪谷間人有草食者因謂值嵗之凶草木之可食不過二三種而已及觀伯髙所著備荒雜録乃知凡草木無不可食要在用之有法耳余讀其說而異之亟欲手寫一帙藏之篋笥以塵物嬰世未遑也翌日君命童子録以相寄方之世所謂辟榖之術其終至於誤人者逺矣嗚呼自含哺鼓腹之樂亡則世亂民窮而人之不得其食者多故讀夷齊采薇之咏園葵紫芝之歌杜子美嵗拾橡栗之句可以觀世變矣伯髙是録夫豈虛傳也哉伯髙始以國學弟子貟入官纍就外補自兵進攜妻子避地四方於草木之品皆嘗試之豫故信其說而為之序送西臺侍御史溫都爾哈瑪爾公彥叙三秦形勝甲天下河山險固邱陵盤紆控隴蜀之㑹當晉魏之衝守之易如鍵就扄攻之難如卵就壓歷周漢而來號為百二之區勢使然也吾元混一之初升雲南亷訪為行臺大德之元徙置奉元號陜西諸道行御史臺於時人才輩出罔有冒進諌無不從言無不聽法度修明人物清晏今西州父老猶能道之春秋傳曰不有君子其能國乎漢祖之盟謂功臣與河山同帶礪誠不刋之論哉自盜起河淮中原披靡民焉麋爛物焉殫殘城郭焉蕩焚無幾秦雖至險難犯及其怠於封守暴兵深入受禍最慘相臣將臣入禀廟謨出掌兵枋固願削絶亂階策勳帝室然藩翰四匝不受縻制一搖手怨輒隨之禍且叵測雖有智能閟莫敢發忠義之士至欲以死樹功動為童氏權姦沮不得行事機之失若砮羽之速不可障何嗟及矣今大亂已極人心思治豈特三輔之民欣見漢官儀乎據形勝之便審緩急之宜開拓舊服實惟其時若夫懲􅉨轍之失遂無意於事功君子不取也噫是責也誰實尸之僕嘗書平亂一策藁成復燬不上蓋以其言過直有犯時忌則人將目以迂目以狂目以濶視為哆言是以不敢至正二十四年春正月朔皇帝受朝賀既進臺臣等曰天下方多事軍國之務䆮弛豈風紀未張之故歟兹欲興舉廢墜非一二老成人何賴由是溫都爾哈瑪爾公自大都路總管拜陜西諸道行御史臺侍御史命下守成往賀之曰上方汲汲圖治得公二三輩用之治效著矣且天下事諫官得言公至宜以恢復責省臣以忠義責將帥以逆順利害責悍鷙反側之徒奮揚國靈風勵有衆以起前日久安沉墯之氣則金湯之險增舊觀矣矧明天子聽斷如神其或牽制難為尤當吐出肺肝諤諤上白使萬里之逺如在旒黈之下可也公學粹而通才宏而逺登第為明進士牧民為良有司持憲為才御史至於専城以却敵稱尹京以理劇聞尤焯焯可書者也守成辱知雅厚曩嚴君之掾中書公實薦之故余兩家為世契則夫罄海內之知公者宜莫余父子若也將行擬送道左未忍無言輒序時事以贈大要謂三秦之險易於封守誠得其人足以有為公既當重寄於軍國之務其必能幹旋圖畫俾朝廷無西顧之憂如國初時乎所謂帶礪河山之烈豈宜讓他人先哉俟其偉績既上鋒車入覲僕雖才薄猶能效諫大夫王褒作聖主得賢臣頌命童子鼓瑟為秦聲以助燕喜也送內史僉院董公景寧赴河間路總管序至正二十有二年山東下河南北悉平上以元元之甫蘇而揔揔以望治也思得良二千石錯布諸郡以綏拊之詔丞相擇省憲之臣往踐其任重民事也於是以內史僉院董公為河間路總管先是公已纍官至第二品至是又增一階之秩以優之洎軷又親被德音陛辭以行皆異數也然朝之大官貴臣之知公者則謂公文學政事宜謀畫廟堂宜激揚風紀宜論述館閣不宜使就外補或曰匪朝廷惜要階方寸地勞之以理劇之任俾不得朝夕近天子之清光若棄置然也意者兵興十年民勞孔棘撫字久曠澤不下流兼之郡縣燬敗守令之職人每不樂為之蓋非不為實不能為亦不可為也今偃兵息民外中之政悉歸條法首以朝臣任之欲其知民牧之重則成績之可俟此則朝廷付托意也然走嘗閉門讀史記考古循吏之迹又嘗避地四方與田父野老語而知民生之艱為守令者之難矣請於公之行白之古諸侯得専征伐近郡守剖兵符以授之今之守令與古諸侯埒有方千里之地而無専城之柄有防禦團練之御而不假以寸兵一旦有警始驅丁壯禦之往來力不能支城遂失守一難為􅉨年百姓殷富不廢耕桑今井屋墟莽瘡痏之衆無糠籺救朝夕命又無從假種糧備耒耜與牛以墾荒蕪使徒流東西者有鄉里而不克保聚二難為然則守令之職其終不可為乎蓋天下事雖成於不易為而實怠於不足為公才足以立事智足以逹變惠足以恤下是行也必能推上之澤使如川流宣上之德使如風行布上之化使如春煦廣上之聰明使如陽光之下燭震霆之莫掩也朝廷慎選守令思革前日之敝而不拘以常法俾才幹之士得罄展布識治體矣昔龔遂治渤海願無拘文法得便宜行事於是化盜賊為良民今乘凋敝之餘欲勞來而安集之者昔人之遺法在乎河間古稱禮樂之國在今三輔之內文物衣冠之盛比於鄒魯國家仁義詩書之澤涵濡百年公於冨庶之餘以此倡之教化可成也公儒者真儒之效久不白欲求通儒用之又不可得俗儒迂濶率為人所詆侮至有能脫去故常卓然見之事功者人將愧伏嚮仰之恐後焉公之往吾儕得不以是望之兩漢而下郎官宰百里刺史為三公朝廷方取通民事有才略者以經濟天下加以嵗月考績既上公之車其北轅乎走辱知最稔行當書其行實附古循吏傳後傅子敬紀行詩序詩大序曰詩者志之所之也詩非本乎志而規規守繩墨以學為聲律之細詩則陋矣虞之歌周之雅十五國之風雖所感異趣所發異情所出異時本乎志也時乎楚漢去古未逺王澤未涸士生其間當風氣朴茂之餘其志大以宏故發之為詩悉和平正大之音觀乎屈原之離騷九歌宋玉景差之九辨諸作蘇李之贈答無名氏之十九首哀而不傷怨而不怒其風之遺音乎至東漢曹魏降及六朝㝢縣幅裂古道風靡作者自三曹七子以還至沈謝諸人才雖傑出志則骫骳故穠麗夭好之詞倡而恚怨哇淫之風行體裁音節視古敻殊時非無一二道古之士顧往往囿於氣象之衰不能振而起之如瓦缶交擊而空桑之瑟不能獨勝也唐之興也以神武翦積世之亂三光五嶽之氣復混士之生也鍾乎天地之英其為志岸然不淆於俗其為詩炳然上麗乎古其擅名於後先若陳子昂孟浩然崔皓李白輩是已至杜甫氏起遂大振絶響志則臯䕫稷契之志詩則虞周楚漢之詩藻發乎天趣聲繫乎風教詩與志混然不鑿也余少也志於詩而學不充溢不能為詩及壯盡取古詩讀之始鋭意於詩而聞識庳近規模纎萎不敢為詩洎乎日月滋久頗㑹其要操筆就紙䆮有生意而知己者鮮無誰與言詩後是竊取一第代匱小官而塵物委瑣不暇為詩嗚呼自余少時迄今踰十五年追維數嵗之間始則不能為詩終則不敢為詩又終則無誰與言詩又終則不暇為詩宜蓁塞之深已固也惟其志不衰於少時故頗能覃思於聲律之細耳傅君子敬與豫同年進士年先於余余兄之相好也初君以上第授官纍陟要階拜監察御史劾權宦人謫官吐蕃權宦人死調僉山北道肅政廉訪司事未上改中書左司都事其召至輦也與豫勞問之隙口誦其紀行詩若干首且曰吾被謫數千里去國幾三周投瘴毒之鄉涉窮荒之地而冒虎狼之叢雖行道之人有見而出涕者我則恬不介懷謂死生命也何必惴惴焉禍患之是懼遂屏去一切營謀而寓志於詩觀其羈危遷竄之極而撫時悲世之意憂君許國之念􅈤􅈤乎短章大篇放而不流壯而不棘非生鍾天地之英有崖然拔俗之志能是乎哉矧其志日益篤詩日益進他日充而大之又將為騷為風為雅為頌下視漢魏唐人之作九牛一毛耳昔原之放逐乃賦離騷不忘乎君也淮南王安贊之曰推此志也與日月爭光可也今君以謫官而有詩獨非古人之志哉噫君子曷志乎志乎古也余何志乎志乎君之志也知君之志莫豫若故序君之詩不敢辭送陳都事使還浙東序始淮潁盜作所向奔突巨鎮大藩望塵摧陷吳粵之交魚餒肉爛江浙等處行中書丞相方公起布衣倡大義集兵東甌以捍一面嵗時朝貢不輟兼之一門昆季雖致身顯榮而知尚學術豈古所謂說禮樂而敦詩書者歟其於君臣之分忠孝之節凛然常存煥然可述此故豫請以往蹟之暴於天下者次第書之朝廷嵗遣使督吳之賦越其境丞相必躬率僚采約舟於津具馬於郊同迎使節其恭敬王命未始一日替之往嵗有盜犯邊故江浙行省右丞丞相之仲氏也力戰死之事聞旌封有加臣節偉哉至正二十四年秋逆孛入朝自為太師丞相皇太子撫軍於晉朝翦大患而外內之臣昧於順逆速於强弱不知死君父者多檄至丞相亟遣使請命於軍誓簡師以從明年秋逆孛伏誅東宫班師還於是遣江浙等處行樞密院都事陳君彥明奉表來覲時皇帝御大明殿省臣以其事入奏錫爵賚之以旌丞相為國敵愾之勞使臣奉命之勤亦光耀矣竣事將歸朝之士咸賦詩以贈而請序於豫豫與彥明相與日淺其出處之詳誠所未知雖欲竭片語塞命亦勦說耳顧惟先民謂尚友千古蓋雖不必親覿其人而髙懷雅趣有𡨕合焉者矧彥明與余定交幾半嵗彥明之賢獨不可知其什一乎彥明儒家也其學敏而通其治事練而逹其剖裁紛糾辨而捷尤優於使事讀至仲尼氏専對之語必慷慨奮激思起古人於九原其襟抱脫略敻出一時輩流萬萬也且丞相一嚬笑能輕重人在恆人惟圖倒衣趨事覬一朝之顯拔譬之升九成之臺欲一躍至焉彥明官不過幕佐而未聞其競進遑遑焉恆抱家國之憂彥明誠忠孝人哉今甲兵將偃息海宇將晏熙彥明歸見丞相當以君臣之分忠孝之節娓娓為說期於力靖南服益修乃職以垂千萬嵗之烈勳余也雖乏藻思猶能吐辭為鋒揮筆為陳寫休聲於鐃歌鼓吹間也送王平口巡檢陳允莊叙自王教逺而伐木絶響矣風雅之衰友誼之喪民俗渾渾乎末流非一朝夕致兹也大抵友為五倫之一而世之人一是目為窽言此隆古之治所以不可復蓋自四代以還則然唐虞之盛若稷契䕫龍協贊帝猷以底雍熙之治周之興也若旦閎夭散宜生之徒同心同德以弼岐豐之化宣王之繼起也若申伯方叔仲山甫尹吉甫之流叶謀共事以濟中衰之厄而友誼章章於天下矣豫生也晚思古人而不見歌伐木而傷之竊嘗觀世之為友者矣炎而趨寒而置雖儒其服而傭賈其心由夷其言而跖蹻其行如是者果可友耶挾貴以驕人者不知一朝而勢去人亦得而驕之矣飾詐以欺人者不知一旦術窮人亦得以欺之矣如是者果可友耶豫取友半天下而未見有如古人者豈豫之愚而人不我友歟及兵後遊山西僅得一人而友之睢陽李子實氏非義不取非力不食有古君子之道良友也久之至保下抵薊門若安肅縣簿王文昭氏祈州判旦榮伯氏永平府倅梅秉玉氏灤州守劉復仁氏昌平邑長舜言氏皆今之良有司豫既得而友之至于文章髙古如燕府紀善王藴德氏及其弟修德氏睢寧邑尹葉夷仲氏布韋士董安常氏而學行修潔如國子助教王政民氏大興邑文學掾王庭實氏處士宋彥中氏豫又得而友之尚何以友誼斷絶為嘆哉豫雅聞王平口巡檢陳允莊氏有能名及其秩滿將如輦下也甫得邂逅於逆旅性嚴而裕寬而和言論慷慨而詳實苐恨其友之太暮又惜其去而不得與之友也雖然才如吾允莊以之宰劇縣刺要郡蓋優為之而允莊則未嘗以為我能為職巡邏之職而久淹於四稔之久而允莊亦未嘗以為我久淹允莊誠吾友也今之往吾知其首膺柄用於一時良有司接武後先矣豫既歎流俗不古若而終之自賀其得良友雖不能盡如隆古時亦足以卜王教之復古也豫於是喜而賦伐木時吾友魏德謙李道勤在送宛平縣主簿陳汝霖序天下郡縣弟子貟凡三嵗一貢於京師至則吏部考其藝而升國學加以嵗月始第其髙下而官之以故士之通經術識治體者由是以進皆即得仕不由此者雖得仕至其陟朝著理民社而以事功表見於外中者鮮宜興陳汝霖氏由太學生分教定逺一仕為北平之宛平縣宛平素號劇縣有藩翰有分閫有郡府符檄積几案館傳相雜㳫師旅衆而征役繁不有殊常之才以任其剸治往往至於廢事汝霖通經術識治體惟其小試一邑人皆難之殊不知以為難者恆見其難以為非難者固未始見其難也觀其均户徭審刑讞董營造歸條法而不紊至於壇廟也學校也郵傳也以繕以營既詳既周矣豫識汝霖久兹當佐政之三稔將上計於朝也不忍一旦别去則為之言曰器如干莫利器也而良冶之治之必取之於百鍊之餘材如楩梓美材也而良匠之用之必求於十年之後士如材傑良士也而善為治者之任之必拔之於纍試之中非一昕夕可驟致其功也汝霖誠良士於郡校於國學於分教礲礪漸漬亦既至矣譬之干莫也而鍛鍊之兹久楩梓也而培育之滋厚其於燭斗牛剸犀象棟大厦柱明堂無難也國朝倣唐虞官人而以九載為秩滿久任之法也汝霖行哉其至也必有膺柄用於常制外而朝廷之上孰不指而誦之龎士元非百里才吾恐霄衢逈而枳鳳騫矣詩曰靖共爾位正直是與豫敢舉是為說期於力蹈前修之軌而大行於時是之謂通經術識治體其於為天下國家也夫何難哉送穆原鼎先生還照縣序安次宋彥中氏學古學其於人不妄許可豫近過薊門留其寓館幾旬餘酒酣氣作每以友誼凋喪為嘆因語其友原鼎穆先生之賢曰先生先代文獻家而才氣之偉逈出一時豫用是惓惓於心者久之已而先生自東海來豫因彥中遂與相識見其風神峻整而襟靈坦夷譬之明月夜光之珠令人不敢狎玩益信彥中之不妄許可矣一日先生招豫三數人小飲逆旅言其祖墓在西城西兵後圮於礫莽邈焉不見蹤跡於是招魂以酹於中野惟先人之墓在北城之東北迄於今不廢因得攘除菑翳而展祭之言訖泫然泣下而悲動一座人人謂其孝行若是則夫篤於友誼也奚惑先生燕人兩河亂避地東海上遂家焉其典邑校於照邑也群弟子一經指授咸中矩墨豁如也今之歸凡在同志皆賦詩寫别爛然成帙矣于是大興邑文學掾王庭賔氏徴豫為序豫以友誼不敢讓謹避席而言曰先生之學求以至乎道也道也者窮天地亘古今不與物物同澌盡未始離萬物以為道亦未始梏萬物以為道也顧可以淺鮮之言言乎哉夫言出於淺鮮而曰我將以行道是之謂求道於口吻而斷喪其本真非道也蓋嘗稽之易矣天地之始有象而後有辭當其太極稔而萬物之未茁也象何寓六畫呈而群象之始著也言何有及乎文王周公孔子始立言有象之後發前聖之不言以昭示斯道於無極以是知之言不可以已也如是非空言也先生之學講之熟蓄之素而行之力其言也其不言也一是足以啓迪來學道蓋若是矣彼呫呫焉形諸口吻而以為道者豫前所謂淺鮮之言非過也矧先生以孝行為鄉閭所稱道友誼為士類所推服其所以植天常礪名教而昭燭乎穹壤孰非道耶吾聞參路二子其行為吾儒䡄度而聖門之言孝誼者皆宗之豫生也晚其於聖哲之髙躅每起望洋之嘆先生行固願執策以從而問津洙泗矣送東安縣鄧侯朝覲序皇帝十有三年有㫖設賢良方正等科徴用邱樊士圖治功也於是金壇鄧侯由聰明正直一仕為東安邑今北平所司也昔者召公奭此其封域西都盛時民咸沐其休澤姬轍既東王室板蕩人情風俗與古敻殊至於近代金革屢起創殘之氓大抵皆其喘蘇悖定之餘矧北平大方面藩翰也分閫也臬司也大府也其所需一是取給於近縣自非竭其力而恤其囏民病其能少瘳乎侯能宣上澤以拊揗之故能得一邑百姓心侯端慎而質直不求名不近功不與物競而退讓若不足靄然仁義人也其學純正而詳其實詩聨編纍帙而忠君許國之念一飯不忘人謂其如杜拾遺諷諫之㫖寓於言表讀之可以懲勸人又謂其如白居易云兹以户口田糧事上計於朝也大夫士皆為詩以贈而僕以譾材辱知於後最稔兼之以斯文骨肉我以雅道薰陶我以直言正論啓迪我也至矣其軷也曷能已於言乎於是致辭於侯曰民者邦之本財者民之心稽諸方册其所以固邦本收民心之說詳矣今天下黔黎涵濡乎仁風化雨中而吾邑也藉侯之惠之力之至故其户田不踰嵗而加多於往時侯行哉其至也奏對文石之陛俯伏主臣而敷宣洞逹必有以動於聰之聽而喜溢乎天日之表矣若夫增秩賜金古所以旌循良吏故事朝家自有公議在溪山送别圖詩序嚴陵邵仲舉由文學起家再轉為密雲隆慶倉使未幾因禁令解去得遂歸養軷有日矣于是燕人李居中氏為作溪山歸隱圖一時名士為賦詩而府紀善王藴德氏為序其顛末是行也不亦炳炳而光榮哉豫以朽木耕牧草澤而混跡樵農其於士之有官位負名聲者鮮蒙其梯接故於仲舉恨其弗獲籋後塵聆雅論締久要實甚恧也近過婺諸葛伯衡氏出一編相示曰吾友邵仲舉之詩也觀其詞氣和平律度嚴整宛然忠孝之著讀之可以想見其人而伯衡曰仲舉之南轅也有退休之喜有歸養之樂有溪山之適雖未與之識可無一言以賁其行哉而固讓不獲則為之言曰窮天地亘古今不與物物同澌盡者忠與孝也是以古之君子未始不仕亦未始必仕未始不進亦未始進而不知退故其進也非徒仕盡其忠於君焉爾其退也非忘君盡其孝於親焉爾仲舉始冠而舉於其鄉也鄉之人固以忠孝事望之已而職倉庾之職一束乎亷慎而不敢肆則其服事乎熙朝也忠矣而今也鄉之人亦必望之曰父母老矣盍來歸乎哉其至也具􅎵瀡時溫凊問起居稱觴為夀而喜動顔色豈不可以言孝乎仲舉行矣矧嚴陵當溪山佳處而桐江之濵富春之麓豈無嚴光之徒耕釣乎其間也固宜與之礪清節植名教激頺波而滌澆風也一山文集卷四
