body:
  text: 一山文集卷六元李繼本撰傳劉義士傳昔孟氏遭七國亂至梁為魏侯罃辨析義利蓋仲尼子思之緒論而孟氏有以發之扵是天下始知蹈義而不迷其塗孟氏之力也寥寥千載餘古風滋淪晦士之所趨聲勢耳民之所尚貨利耳巫醫百工之所習末術耳譎計耳予以是重傷之雄扵保下為屬邑實天水氏金源氏割據處予過而欲詢前代事故老無在者扵是有野夫黃冠杖策自林下出鬚髪盡白而骨貌清古若有道者問之劉其姓寜其名而士安其字也士安邑人少孤貧鞠扵祖母而依其從父以居及壯耕釣為業而信義凛然動鄉閭從父卒為諸幼畢婚娶營貲貨友愛之至人鮮與儔先是人有以錢寓士安家未幾兵興道窒不復至即冒鋒燹以往盡以其物歸之河朔之亂連嵗不熟民多為飢卒所食胔骼徧野腥穢塞天遂率子弟操畚鍤埋掩無遺已而逺近大飢餓殍滿道則又堰河取魚以釡灶置水次烹魚食往來人由是四方之逃亂者多歸之事平還鄉里無一死散皆其保完之力也邑丞扈文振老而喪明骨肉蕩析士安延致扵家者五年而禮敬猶一日及疾作復極力療治其死也士安哭之哀扵是具棺斂擇善地以葬而弔祭一以法文振在時有白金楮幣布帛總若干死之明日士安悉緘附紫泉人劉成成文振壻也貧而有孱疾及得此感泣者累日邑之令佐嘉其義髙議復其身以敦勵之士安曰吾民也吾盡吾民分内事吾心也吾又奚所望士安生長農畆今旄矣使早知力學雖詩禮士有弗能及然其制行與古人同處甚多而邑長程侯九鼎安肅簿王文昭氏縣博士李好問氏為予言其二三作劉義士傳漢水李延興曰馬之馳峻坂也有纒以制之車之走康莊也有柅以止之舟之渉大川也有檣楫以迴泊之人之扵身也一束乎義而不敢肆天之正路豈難至哉一或昧焉吾見顛倒惶惑而不知返駕者滔滔皆是人常言劉士安見卿大夫講説孟子書輒踴躍喜扵以益知士安之重義也清白生傳清白生陜之興平人任其姓子勉其字也平生嗜欲不萌扵心而制行之髙如層氷沍寒積雪皓縞玉瓚黃流之兩萃厥美也自童丱嶷然如老成人遇族戚遇里閈非其義一介弗苟取予苟當乎義則勇往直前無難色其學研深燭奥益肆其力聞明師良友不憚津陸之逺而往從之于邠于冀于河雒囊書擔笈風雨寒暑自若也始冠為隴州文學掾其教切近而篤實一洒浮豔而趨乎古久之當路者薦之天官一仕為宛平邑長其政明肅而簡静世之所謂良有司者鮮與之埒也子勉學古學而與時背馳謂昔司馬光代以清白顯每讀史傳輒攘袂奮臂想見其為人鄉先生髙其行而以清白許之由是鄉之人皆稱為清白生其友李延興曰光昭代偉人生西北勁武之鄉得天地精英秀卓之氣故其道徳勲伐為士類所矜式為四夷所尊服為兒童走卒所稱誦凝然炳然扵塵埃之表而不混也後乎百祀侯以殊常之器而穎出秦晉之間蓋其地實先民之所發跡而山川炳靈迴薄乎終古宜其代不乏人矣矧侯學古入官朝廷一日大用侯其必能以清白礪天下如光之爲輔相時乎子勉曰世常言古今人不相及予何人斯而敢自比扵古人彼嘐嘐然曰古之人古之人非我也子勉儒學其先世皆有聞人雖其流俗渾渾而世徳彌盛大夫士之過其門者必式之曰此陜右清白家論曰太清之清氣之至清也天下之清無以加太素之白質之至白也而天下之白莫能掩君子揆之扵是養其氣而弗梏則發而為天地之氣完其質而弗鑿則凝而爲聖賢之質其扵清白也何有是道也鴻蒙傳之太始太始傳之副墨之子志乎古者問諸清白生房氏家傳嵗壬辰安次李延興為雄邑招致親夏楚事而賔友凋落恒抑鬱無誰語是歳嘉平封邱王好謙氏來為邑之幕長一見如平生歡幕長學行醇正而言論詳實人有寸善極口稱道不置否則掩覆百至非如淺淺之爲大夫者一不合訾議横出不少貸也間語其友房徳麟之賢且曰房氏繇上世來雖隱徳弗耀而善之積也甚逺歷宋而金而元俱占籍東昌之博平髙祖忠配翟氏曽祖皆逸其諱曽妣胡氏曽從祖信仕元為前衛百夫長祖妣李氏早失所天守節不渝以終父燠字士明幼孤知自樹立竟以孝行著鄉閭年七􅐆卒配髙氏繼李氏四子長守信字徳誠次早世次守義字徳宜髙出也次守仁即徳麟李出也徳麟天稟毅沉見誼必為非其誼雖壓以賁育之勇弗奪也弱齡刻苦嗜學聞明師良友鋭意往從囊書擔笈不以川陸之阻為辭不以寒暑夜盡之變而作輟也洎壯從公餗張先生學繼從維齋楚先生學研深燭㣲大肆其力粹如也喪二親絶口水漿者數昕夕雖服除不近葷酒而哭泣哀慟三年如一日人以為難後東昌路以儒薦從事吏牘凡兩稔繼遷東平路吏又四稔俱以幹潔最一時路尹張孝則良二千石也雅愛重之嘗薦之憲府不果用丁酉秋兩河始兵縣父老鳩民為丁捍禦閭井推守仁為萬夫長亦善其職戊戌春暴兵蝟起糜爛濟兖州郡迺與鄉之老稚挈家走河間先是連嵗飢餒而疫氣大作人多逃死妻張洎三男皆物故惟少子綱在才八歳耳迺襁負而北時樞宻副使荅蘭領兵鎮古北口與語竒之辟充掾史德麟强起領簿書為禄仕也明年山東監察御史牒薦補憲吏居五月遷遼憲又明年以老病辭歸再配李氏綱年二十娶張氏其孫又新生三年戊申亂相失戎馬間癸丑始物色得之年十七娶趙氏洪武初徳麟仍籍博平因之教授鄉里未幾邑長禮聘為文學掾讓不獲已扵是横經泮席再易天星癸亥春以目𤯝在告得展邱墓葺田廬課耕織暇則以詩書教子孫矧其性夙好山水去邑三里許則其莵裘也其先墓舊有老柏數十丈髙軼雲表鉅可汗牛馬充棟梁至亂作悉戕扵薪槱徴諸一木之微而累葉之承籍可槩見也墓前後腴田二百畆非歉嵗可以無飢草屋八九間隱見林霏杳靄中而士類之過從者歆其氣誼輒戀戀不忍去非慶弔歳時不一至城市至則未盡晷即歸歸則扶笻吟嘯而蕭逺曠逸超然有出塵之趣或曰昔之隱者若戴龜蒙林和靖皆清介自守不齷齷與世混濁房徳麟豈其人耶延興徃年兩過東昌未聞語及房氏者今長史能歷歷口其祥且謂延興曰子名能古文幸而傳其實以示後之人庶其不與物物斯盡也君子曰好謙可謂樂道人之善矣故書好謙與徳麟同里兵後始家封邱云論曰房氏自鼻祖植德其後培根而食實者綿數世弗殄絶雖中土數十年金革戰鬬民死相籍大姓之家噍無遺類而房氏由子而孫而雲仍皆能保完萬死中則其鬼血食不餒矣世徳之報其至此哉李槱翁傳保定之容城有隱君子自號槱翁李其姓問其名而好問其字也翁生而穎秀六七嵗時與群兒嬉戲鄉人見其貌骨清古舉止不凡為驚嘆曰此非里中兒比也稍長讀書鄉校衆皆推服以為不可及已而囊書擔笈以逰京師搢紳先生見其循循雅飭則又誘掖奬進而許其可與入道其於學朝夕淬礪不以事物是非亂心故能至其所至而得其所得表裏貫徹體用兼該悉有條理而蔚乎其可觀也已而以經學教授鄉里時科舉制行學者争先慕效為舉子業登其門者一經指授動中肯綮而不病其為難也其所識皆海内知名之士若光人龔友輔齊人潘述古汴人荅禄道夫邢人宋彦貞燕人楊九萬翁從之㳺者殆三十年親其顔色薰其徳誼讀其文章聆其言論沛乎若江海之涵濡而無有畔岸也及乎兩河始兵中原板蕩骨肉殫殘而衣食無取給朝而槱扵山不知䟦履之爲難也夕而槱扵野不知寒暄之改候也伐木而歌弛檐而休不知暑濕之為勞而積薪之凡幾也此翁之所自得而世之不知翁者謂其視王質翁子輩實相伯仲不知鄙且誕乎翁之言曰吾衰暮以來惟嗜樵採雖扵一草木之細取非苟取故不斷喪吾道真棄非慢棄故不暴殄吾天物吾扵是得取予之道焉吾今旄矣舍荒山窮谷吾誰依吾固願世之士以忠信為本根六藝為枝葉詩書為灌溉含其英咀其華而食其實將見環洙泗際闗洛而極扵海濵鄒魯巋乎道徳之垣而鬱乎君子之林何適而不可樵牧為乎㝠栖山林水石為伍而鹿豕與㳺乎其友李延興曰子之説非鄙且誕也翁從祖父景陽受業劉文靖公之門累官户部司計父近道累官易縣簿翁無子論曰或曰李槱翁何如人也曰翁端慎老成人也觀其讀書學道不矯矯以釣名佩仁服義不悻悻以自好鄉黨稱其善則雖童兒女婦無異辭言行孚扵人而視州里蠻貊同一軌其為人亦可少見其槩矣惜其白首邱樊不霑一命以行其道天之報施善人何為恝然若是乎孔子曰道之將行也與命也道之將廢也與命也從古智能之士富貴而磨滅者不可縷數獨非命與翁能不以貧賤移其志而順受其命之正雖老扵樵牧無怨悔焉非修身慎行扵道為有得孰克臻兹故曰翁端慎老成人也栖霞子傳栖霞子姓陳氏字士文南昌新建人其上世以儒業顯元季天下亂父祖皆隱徳弗耀而衣冠詩禮濟濟彬彬雲仍相襲閭比相望也栖霞子生而有異質望之如芝蘭玉樹照映階戺稍長變化不測嶄然露頭角扵群兒中鄉之人見而異之謂其軼類絶塵如是必能大其門閥以光照先烈無疑也始冠益自樹立而循蹈規矩端慎如老成人人勸之學則曰吾恥讀非聖書吾安呻其佔畢耗精魄故楮中耶勸之仕則曰吾雅無仕進意吾安能與時下上脂韋一世而墮壞名節耶夫輪扁之斷輪非譏夫讀書也懼夫學焉而不綜其要徒學也楚狂之歌鳳非惡夫行道也惜其仕焉而與時背馳徒仕也已而渡河淮渉江漢歷閩越王公大人忘其勢而與之善先生長者忘其年而與之交而襟宇曠夷見者恱服談鋒横出聞者竦聽雖家居不問有無至與人交洞徹底裏而一觴一詠自放扵山水間澹然忘世泊乎若無所營非流俗可及也久之去隱匡廬山中學道之士多與之㳺由是學行益髙蓋其山林之日長故其積者厚增者多出者益遐也未幾有司以其才薦扵朝一仕爲保定府尹當其在畎畆時若將終身雖千駟萬鍾弗顧也及其登宦途尹大郡慨然以為己任而不辭行其道也其所居近赤岸山其間朝夕多霞氣故自號栖霞子而好事曰栖霞子喜談神仙事殆將餐六氣飲絳霞𡨕栖塵滓之外而藏其神扵不朽乎栖霞子曰吾學道也世豈有神仙若方士者流公孫卿李少君輩所云哉栖霞善詩其詩舂容温厚如其政云雄邑尹周士瞻口其為人陳其槩且徴予言予故信其説而次第之先是予在薊門聞栖霞子名甚習心竊慕之及聞士瞻說欲往拜其門而牽扵塵役未暇也作栖霞子傳論曰天地藏乎大虚日月藏乎夜旦依乎物而栖焉者也蛟鼉藏乎江海虎兕藏乎山林圓首方趾之藏乎宫室囿扵物而栖焉者也雖然栖焉而得乎藏藏焉而頥其神是其備萬物兼三才趋鴻濛而入太始終不朽者也若天地萬物之藏吾又安能語其端倪耶劉則禮傳劉則禮字景淵世家大梁墨莊九世孫髙大父仕西江因家臨江大父始遷安陸之京山則禮聦慧有識鑒平居呐呐不能言洎衆務叢委片語折之即中肯綮讀書通大義無經生學士氣習年四十猶不遇衆論惜之至正辛卯兩河亂乃割財募兵𨽻四川平章爻著麾下攻安陸襄樊唐鄧悉討平之兄弟子侄多死扵兵積功受沔陽府判官歳戊戌河南丞相逹實巴圖爾克夾河大康鈞汝許亳有勞升同知安陸府事丞相死其子博囉特穆爾為平章代領其兵討豐州雲内下之遷同知大同路緫管府事明年冬京師飢平章貢粮五萬石委則禮董之時蔚州未下道塗阻塞嚴衛周防善達無虞又明年春從河南平章方托克托北討㧞全寜等郡擢同知荆湖宣慰司事尋奉㫖領兵與平章諤勒哲特穆爾合攻保定祁蠡等處拜河南行樞宻院副使嵗甲辰秋博囉特穆爾入朝自為太保中書右丞相受崇福司使兼河南行樞宻院副使鎮白羊口眀年中書左丞相庫庫特穆爾緫兵南伐授湖廣等處行中書省左丞𨽻太子同知詹事托音特穆爾戲下尋奉㫖受平章摩該節制調集賢學士有文綺尚醖之賜皇太子以璽書旌之嵗戊申京師失守車駕北巡則禮所部兵潰散僅餘百人止扵易之龍門山居無何從十餘騎由間道謁總戎雲中至俾還徴兵時將作院使田邁律團結沿山諸訾留則禮共事遂與畫策封守未幾總戎敗績太原聲勢日斷則禮謀扵衆曰守柵以待王師也今内無供外無援而敵兵四匝諸寨或破或降獨欲堅守得乎不如擁衆赴行在否則徒餌虎口無益也邁律為下所沮無去意則禮請先往不聽自是日夜請去值邁律恚曰汝去即去汝部曲斷不可去則禮語人曰事已如此恐終䧟扵敵我幸有子宏我必令北奔不使與我俱陷也扵是宏往至蜚狐遇亂兵還時都事佛嘉努至善亦避地山中其挈家北也則禮泣送之曰至善去我弗能與俱公到朝廷庶以明我之心無他也言訖哭復不已哀動路人今山中人猶能語其事明年春敵兵至邁努遇人少恩信平日託為心旅者往往潛出通好邁努知事不可為趋則禮亟見敵為遷延計則禮難其行衆曰公不去恐見禍不若挺身見敵活一寨人則禮復固辭衆曰死生存亡之機形扵目中公倘受禍扵此是死扵無名不若見敵而死死則無媿况未必死乎則禮曰我去公輩宜死守勿我慮也遂往見其主帥衆歡甚則禮謂邁努曰我幸不死公之庇也且我之形勢未為敵有而彼之虚實反爲我得及今尚可守也邁努曰人無固志糧無宿儲今又曷可守則禮曰公不守則死死則我願以身徇遂相與痛哭失聲舉座皆哭明日邁努等率其衆降帥愛則禮之才且勇俾代領其衆乃辭復欲奏以官又辭今旅寓薊門以澹泊自處每與朋儕語及忠孝事輒嗚咽流涕云李延興曰則禮嘗宣勞帝室矣而功未崇而才未究而志未就天也自古才杰之士其生不辰其死無譽者不可殫述獨則禮歟一山文集卷六
