body:
  text: 一山文集卷三元李繼本撰序釣魚翁詩序釣魚翁爵祿不入其心惟嗜魚故釣輒得魚寂寞之濵投竿而漁有不知寒暄之改候飢凍之迫身欣戚之易慮蓋嗜之篤故久而不能忘初非厄于生事而藉以糊其口也至於得魚與不得魚亦未嘗計失得而渝所嗜也大抵嗜而因物而觸於心雖古之人亦曷能無所嗜哉故秋之嗜奕伯牙之嗜琴中散之嗜煆伯倫之嗜酒張旭之嗜書皆以之而生以之而死而能不少置焉者豈直釣魚翁之嗜魚乎雖然翁之嗜吾固得而知之翁之志吾不得而知之也昔者吕望釣渭而鷹揚之師實開有周之鴻業子陵釣桐江而一節之髙式重大漢之九鼎蓋其所嗜者小而所志者大也翁老矣其於魚也嗜之而彌篤此其志豫誠不得而知之顧嘗觀翁往來釣魚處山空水寒魚鳥間暇超然有出塵之想得不使人懷非熊之吉夢而慕江湖之髙風者乎國家方求興王之佐不召之臣翁乎其不獲終老於山澤也審矣彼龍伯之誇任公子之誕直莊生之寓言耳不足為翁道也翁曰我知釣魚而已餘非所及也已而有野樵過之翁酌以酒而歌之曰爾樵之適兮我釣之逸兮取樵以湘兮取魚以食兮漁兮樵兮足以放吾之迹兮歌竟翁謂樵曰子去吾將釣吾魚釣魚翁謂李仲學而野樵則翁之同姓延興也野樵序禱雨詩序劉侯為繁峙丞政務寬簡民物清晏郊野無犬吠之警洪武辛亥夏不雨民嗷嗷無生意侯適以事詣大府未遑恤也縣父母享于龍祠以禱之弗應遍禮群祠又弗應自是奔走告祀不懈益虔五月二十有二日乃雨民以為未洽也未幾侯竣事還䀌然傷之乃潔齋致誠徒跣露髻㪺水於南山之龍湫侑以香幣奉以牲酒以薦於羣祠以享以祀以祝以祈以罄夫悃愊之忱時六月七日也是日晝漏下二十刻青天無雲炎光爥地薌燎始上浮靄四垂霞飈回旋電雷訇發感格之機既昭滂洽之澤斯至越九日乃雨明日又雨又明日大雨民翕然以樂躍然以忭而歡然如更生邑之士咸見之詠歌而謁豫序其端余惟記不云乎天降時雨山川出雲蓋雨降自天信非吾人所能力致者然而有可致之道焉何也吾盡吾誠焉耳惟誠可以開金石貫幽顯動天地感神明雨澤之降母惑也况侯為民以請命而竭誠以籲天精意昭垂洞逹無間天其有不應乎昔者唐叔有善政而禾同穎景公出善言而星退舍李廣利拔劒刺山而飛泉湧出與夫劉昆熄江陵之火韓愈開衡山之雲感應之機古今一轍固非方士者流以竒術祕計簧鼓乎顓蒙者比也豫田野之細氓沭侯之惠深謹托其實而序之侯字仲儀江西人送北平行大都督府掾宗德章序北平古為邊壤唐虞三代曰幽都周秦戰國曰燕隋唐曰幽州自召公始封至顯王滋大晉慕容垂唐安史五代劉守光皆盜據其間金源氏始建國帝其疆入國朝悉歸於職方風氣徑武河山雄麗五方走集蹄雷轂風險厄繁冨為西北邊最洪武初乃行大都督府以鎮之壯形勢固關要也宗公德闕一山文集卷三
